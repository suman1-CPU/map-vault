<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<title>MAP Vault</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f5f7">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0d0f14">
<link rel="preconnect" href="https://script.google.com" crossorigin>
<link rel="preconnect" href="https://script.googleusercontent.com" crossorigin>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='15' fill='%233a56d4'/><path d='M32 12l14 5v11c0 9-5.7 15.4-14 19-8.3-3.6-14-10-14-19V17l14-5Z' fill='none' stroke='white' stroke-width='4' stroke-linejoin='round'/><circle cx='32' cy='27' r='4' fill='white'/><path d='M32 31v8' stroke='white' stroke-width='4' stroke-linecap='round'/></svg>">
<style>
/* MAP Vault — single-file client. System fonts, inline SVG icons, no external requests. */
:root{
  --bg:#f4f5f7; --card:#ffffff; --ink:#191d26; --mut:#5f6b7e; --line:#e4e6eb;
  --accent:#3a56d4; --accent-soft:#eceffb; --accent-ink:#ffffff;
  --chip:#eef0f4; --red:#c93a2c; --redbg:#faeae7; --amber:#96610a; --amberbg:#f7efdc;
  --green:#1d7a46; --greenbg:#e3f2e8; --gold:#8a6d1a; --goldbg:#f6efd8;
  --shadow:0 1px 2px rgba(18,22,33,.05),0 4px 14px rgba(18,22,33,.05);
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --navh:64px;
  color-scheme:light dark;
}
@media (prefers-color-scheme:dark){:root{
  --bg:#0f1116; --card:#16191f; --ink:#e6e9f0; --mut:#939dac; --line:#262a33;
  --accent:#8ea4ff; --accent-soft:#1e2536; --accent-ink:#0e1220; --chip:#1e222a;
  --red:#f0857a; --redbg:#2e1a17; --amber:#e3b25f; --amberbg:#2c220f;
  --green:#5ec78f; --greenbg:#12271b; --gold:#d9be67; --goldbg:#282112;
  --shadow:0 1px 2px rgba(0,0,0,.45),0 8px 22px rgba(0,0,0,.32);
}}
:root[data-theme="light"]{--bg:#f4f5f7;--card:#ffffff;--ink:#191d26;--mut:#5f6b7e;--line:#e4e6eb;--accent:#3a56d4;--accent-soft:#eceffb;--accent-ink:#ffffff;--chip:#eef0f4;--red:#c93a2c;--redbg:#faeae7;--amber:#96610a;--amberbg:#f7efdc;--green:#1d7a46;--greenbg:#e3f2e8;--gold:#8a6d1a;--goldbg:#f6efd8;--shadow:0 1px 2px rgba(18,22,33,.05),0 4px 14px rgba(18,22,33,.05);color-scheme:light}
:root[data-theme="dark"]{--bg:#0f1116;--card:#16191f;--ink:#e6e9f0;--mut:#939dac;--line:#262a33;--accent:#8ea4ff;--accent-soft:#1e2536;--accent-ink:#0e1220;--chip:#1e222a;--red:#f0857a;--redbg:#2e1a17;--amber:#e3b25f;--amberbg:#2c220f;--green:#5ec78f;--greenbg:#12271b;--gold:#d9be67;--goldbg:#282112;--shadow:0 1px 2px rgba(0,0,0,.45),0 8px 22px rgba(0,0,0,.32);color-scheme:dark}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.45;
  -webkit-font-smoothing:antialiased;padding-bottom:calc(var(--navh) + env(safe-area-inset-bottom));}
button{font:inherit;color:inherit;cursor:pointer}
input{font:inherit;color:var(--ink)}
input::placeholder{color:var(--mut);opacity:.7}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
::selection{background:var(--accent-soft)}
:is(button,summary,a):focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}
.row:focus-visible,.cd:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;border-radius:10px}

/* ---------- icons ---------- */
.ic{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto;display:block}

/* ---------- header ---------- */
header{position:sticky;top:0;z-index:30;background:var(--card);border-bottom:1px solid var(--line);
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;display:flex;align-items:center;gap:10px}
.logo{display:flex;color:var(--accent)}
.logo .ic{width:23px;height:23px;stroke-width:1.6}
h1{font-size:16.5px;margin:0;font-weight:700;letter-spacing:-.01em}
.grow{flex:1}
.badge{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--chip);color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
.badge.admin{background:var(--accent);color:var(--accent-ink)}
.iconbtn{border:1px solid var(--line);background:var(--card);border-radius:9px;width:38px;height:38px;flex:0 0 auto;display:grid;place-items:center;color:var(--mut)}
.iconbtn .ic{width:17px;height:17px}
#who{font-size:12.5px;color:var(--mut);font-weight:500}
.tsun{display:none}
@media (prefers-color-scheme:dark){
  :root:not([data-theme="light"]) .tsun{display:block}
  :root:not([data-theme="light"]) .tmoon{display:none}
}
:root[data-theme="dark"] .tsun{display:block}
:root[data-theme="dark"] .tmoon{display:none}
:root[data-theme="light"] .tsun{display:none}
:root[data-theme="light"] .tmoon{display:block}

/* ---------- search ---------- */
.searchwrap{position:sticky;top:calc(59px + env(safe-area-inset-top));z-index:25;background:var(--bg);padding:12px 16px 8px;max-width:760px;margin:0 auto}
.searchbox{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 14px}
.searchbox:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.searchbox>.ic{width:18px;height:18px;color:var(--mut)}
.searchbox input{flex:1;border:none;outline:none;background:none;font-size:16px;min-width:0}
.searchbox .clear{border:none;background:var(--chip);border-radius:50%;width:26px;height:26px;color:var(--mut);display:none;position:relative;padding:0;flex:0 0 auto}
.searchbox .clear .ic{width:12px;height:12px;position:absolute;inset:0;margin:auto;stroke-width:2}

/* ---------- layout ---------- */
.wrap{max-width:760px;margin:0 auto;padding:8px 16px 40px}
.section{margin:20px 0 8px;display:flex;align-items:baseline;gap:8px}
.section h2{font-size:11.5px;margin:0;color:var(--mut);font-weight:650;text-transform:uppercase;letter-spacing:.8px}
.count2{margin-left:auto;font-size:12px;color:var(--mut);font-weight:650;font-variant-numeric:tabular-nums}

/* ---------- cards & rows ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
.rowlist .row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer}
.rowlist .row:last-child{border-bottom:none}
.rowlist .row:active{background:var(--chip)}
@media(hover:hover){.rowlist .row:hover{background:var(--chip)}}
.row .avatar{width:38px;height:38px;border-radius:10px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:650;font-size:13.5px;flex:0 0 auto}
.row .avatar.cs{background:var(--amberbg);color:var(--amber)} .row .avatar.vat{background:var(--greenbg);color:var(--green)}
.row .rmain{flex:1;min-width:0}
.row .rname{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.006em}
.row .rsub{font-size:12px;color:var(--mut);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.chev{display:flex;align-items:center;color:var(--mut);flex:0 0 auto}
.chev .ic{width:15px;height:15px;stroke-width:2;opacity:.7}
.pill{font-size:11.5px;font-weight:650;padding:4px 8px;border-radius:6px;background:var(--chip);color:var(--mut);white-space:nowrap;flex:0 0 auto;font-variant-numeric:tabular-nums}
.pill.red{background:var(--redbg);color:var(--red)}
.pill.amber{background:var(--amberbg);color:var(--amber)}
.pill.green{background:var(--greenbg);color:var(--green)}
.pill.gold{background:var(--goldbg);color:var(--gold)}
/* list rows: urgency as quiet colored text, not filled chips — red stays loud only when rare */
.rowlist .row>.pill{background:transparent;padding:0 2px;font-size:12px;font-weight:650}
.muted{color:var(--mut)}

/* ---------- dossier ---------- */
.dhead{padding:18px 16px 14px;border-bottom:1px solid var(--line)}
.dhead h2{margin:0 0 6px;font-size:19px;line-height:1.25;font-weight:700;letter-spacing:-.012em}
.dhead .meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:13px;color:var(--mut)}
.mono{font-family:var(--mono)}
.dsec{padding:6px 16px 14px}
.dsec h3{font-size:11.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin:18px 0 6px;font-weight:650}
.fact{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.fact:last-child{border-bottom:none}
.fact .fl{width:118px;flex:0 0 auto;font-size:12.5px;color:var(--mut);font-weight:550}
.fact .fv{flex:1;min-width:0;font-family:var(--mono);font-size:13.5px;word-break:break-word}
.fact .fv.plain{font-family:var(--sans);font-size:14px}
.copy{border:none;background:var(--chip);border-radius:8px;width:30px;height:30px;display:grid;place-items:center;padding:0;color:var(--mut);flex:0 0 auto}
.copy .ic{width:14.5px;height:14.5px}
.copy:active{background:var(--accent-soft);color:var(--accent)}
@media(hover:hover){.copy:hover{background:var(--accent-soft);color:var(--accent)}}
.reveal{border:none;background:var(--goldbg);color:var(--gold);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:650;flex:0 0 auto;display:inline-flex;align-items:center;gap:6px}
.reveal .ic{width:15px;height:15px}
.reveal:disabled{opacity:.6;cursor:default}
@media(hover:hover){.reveal:hover{filter:brightness(.96)}}
:root[data-theme="dark"] .reveal:hover{filter:brightness(1.1)}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .reveal:hover{filter:brightness(1.1)}}
.lockchip{font-size:12px;color:var(--mut);background:var(--chip);border-radius:7px;padding:6px 10px;flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;font-weight:550}
.lockchip .ic{width:13px;height:13px}
.revealed{background:var(--goldbg);color:var(--gold);border-radius:6px;padding:2px 7px}
.dueband{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px 4px}
.duecard{border:1px solid var(--line);border-radius:10px;padding:11px 13px;background:transparent}
.duecard .dl{font-size:11px;color:var(--mut);font-weight:650;text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:6px}
.duecard .dl .ic{width:14px;height:14px;stroke-width:2}
.duecard .dv{font-size:17px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.duecard .dn{font-size:12px;color:var(--mut);margin-top:2px}
.duecard.red{border-color:var(--redbg)} .duecard.red .dv,.duecard.red .dl,.duecard.red .dn b{color:var(--red)}
.duecard.amber{border-color:var(--amberbg)} .duecard.amber .dv,.duecard.amber .dl,.duecard.amber .dn b{color:var(--amber)}
.srcnote{padding:2px 16px 14px;font-size:11.5px;color:var(--mut)}
.backbtn{border:none;background:none;color:var(--accent);font-weight:600;font-size:14.5px;padding:14px 16px 0;display:flex;align-items:center;gap:6px}
.backbtn .ic{width:17px;height:17px}

/* ---------- bottom nav ---------- */
nav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--card);border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:6px 8px calc(6px + env(safe-area-inset-bottom))}
nav button{flex:1;max-width:120px;border:none;background:none;color:var(--mut);font-size:10.5px;font-weight:600;letter-spacing:.1px;
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;border-radius:12px}
nav button .ni{display:flex;align-items:center;justify-content:center;padding:3px 12px;border-radius:99px}
nav button .ni .ic{width:21px;height:21px}
nav button.on{color:var(--accent)}
nav button.on .ni{background:var(--accent-soft)}
@media(hover:hover){nav button:not(.on):hover{color:var(--ink)}}

/* ---------- filters ---------- */
.filters{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.fbtn{border:1px solid var(--line);background:var(--card);color:var(--mut);border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;white-space:nowrap}
.fbtn.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
@media(hover:hover){.fbtn:not(.on):hover{color:var(--ink);border-color:var(--mut)}}

/* ---------- buttons ---------- */
.btn{font-weight:600;border:1px solid var(--line);background:var(--card);border-radius:9px;padding:10px 15px;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:7px}
.btn .ic{width:15px;height:15px}
.btn.primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.btn.sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
@media(hover:hover){.btn:hover{background:var(--chip)}.btn.primary:hover{background:var(--accent);filter:brightness(1.07)}}

/* ---------- calendar ---------- */
.cal{padding:12px 12px 10px;margin-bottom:12px}
.calhead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.calhead b{font-size:15px;font-weight:650;letter-spacing:-.006em}
.calhead .iconbtn{width:32px;height:32px;border:none;background:var(--chip);border-radius:8px}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.caldow div{text-align:center;font-size:10.5px;color:var(--mut);font-weight:650;padding:2px 0;letter-spacing:.4px}
.cd{height:46px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:13px;position:relative;border:1px solid transparent;font-variant-numeric:tabular-nums;color:var(--mut)}
.cd.off{visibility:hidden}
.cd.has{cursor:pointer;font-weight:650;color:var(--ink)}
.cd.has:active{background:var(--chip)}
@media(hover:hover){.cd.has:hover{background:var(--chip)}}
.cd.today{border-color:var(--accent);color:var(--accent)}
.cd.sel{background:var(--accent);color:var(--accent-ink)}
.dots{display:flex;gap:2.5px;height:5px}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block;flex:0 0 auto}
.dot.acc{background:var(--accent)} .dot.cs{background:var(--amber)} .dot.vat{background:var(--green)} .dot.od{background:var(--red)}
.cd.sel .dot{background:var(--accent-ink)}
.more2{position:absolute;top:2px;right:4px;font-size:9px;color:var(--mut)}
.cd.sel .more2{color:var(--accent-ink)}
.callegend{display:flex;gap:14px;justify-content:center;margin-top:10px;font-size:11.5px;color:var(--mut);flex-wrap:wrap}
.callegend .dot{margin-right:4px}
.selday{display:flex;align-items:center;gap:8px;margin:2px 0 8px;font-size:13px;color:var(--mut);font-weight:600}
.selday button{border:none;background:var(--chip);border-radius:50%;width:22px;height:22px;color:var(--mut);position:relative;padding:0;flex:0 0 auto}
.selday button .ic{width:10px;height:10px;position:absolute;inset:0;margin:auto;stroke-width:2.25}

/* ---------- reference sheets ---------- */
.acc{border-bottom:1px solid var(--line)}
.acc:last-child{border-bottom:none}
.acc>button{width:100%;border:none;background:none;text-align:left;padding:14px 16px;font-size:14.5px;font-weight:600;display:flex;align-items:center;gap:10px}
.acc>button>.ic{width:18px;height:18px;color:var(--mut)}
.acc .chev{margin-left:auto;transition:transform .15s}
.acc.open .chev{transform:rotate(90deg)}
.accbody{display:none;padding:0 16px 14px;overflow-x:auto}
.acc.open .accbody{display:block}
table.misc{width:100%;border-collapse:collapse;font-size:12.5px}
table.misc td{border:none;border-bottom:1px solid var(--line);padding:8px 10px 8px 0;vertical-align:top;font-family:var(--mono)}
table.misc tr:last-child td{border-bottom:none}
table.misc td:first-child{color:var(--mut);font-family:var(--sans);font-size:12px}
.locked{border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:var(--ink);background:var(--bg);font-size:13.5px;display:flex;justify-content:space-between;align-items:center;gap:10px;margin:0 16px 12px}
.locked>span{display:flex;align-items:center;gap:8px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--mut)}
.locked b{color:var(--ink);font-weight:600}
.locked .ic{width:15px;height:15px;color:var(--gold)}

/* ---------- modal / toast / empty ---------- */
.scrim{position:fixed;inset:0;background:rgba(9,11,16,.55);display:none;align-items:flex-end;justify-content:center;z-index:60;padding:0}
.scrim.on{display:flex}
@media(min-width:640px){.scrim{align-items:center;padding:16px}}
.modal{background:var(--card);border:1px solid var(--line);border-radius:16px 16px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));max-width:460px;width:100%;box-shadow:var(--shadow);max-height:92dvh;overflow-y:auto}
@media(min-width:640px){.modal{border-radius:16px;padding-bottom:22px}}
.modal h2{margin:0 0 6px;font-size:17px;font-weight:700;letter-spacing:-.01em}
.modal p{color:var(--mut);font-size:13.5px;margin:0 0 16px}
.modal summary{font-size:13px;color:var(--mut);cursor:pointer}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--mut);margin-bottom:5px}
.field input{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px;background:var(--bg);outline:none;font-size:16px}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.toast{position:fixed;bottom:calc(var(--navh) + 14px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 16px;border-radius:10px;font-size:13.5px;font-weight:550;z-index:80;opacity:0;transition:opacity .2s;pointer-events:none;max-width:88vw;text-align:center;box-shadow:var(--shadow)}
.toast.on{opacity:1}
.empty{text-align:center;color:var(--mut);padding:48px 20px;font-size:14.5px}
.empty .big{display:flex;justify-content:center;margin-bottom:10px}
.empty .big .ic{width:32px;height:32px;stroke-width:1.5;opacity:.75}
.skel{height:110px;border-radius:12px;background:linear-gradient(100deg,var(--chip) 40%,var(--card) 50%,var(--chip) 60%);background-size:200% 100%;animation:sh 1.2s infinite}
@keyframes sh{to{background-position:-200% 0}}
.loadstat{display:flex;align-items:center;gap:13px;padding:15px 16px;margin-top:14px;font-size:14px}
.loadstat b{font-weight:650}
.loadstat .sub{font-size:12.5px;color:var(--mut);margin-top:2px}
.spin{width:20px;height:20px;border-radius:50%;border:2.5px solid var(--line);border-top-color:var(--accent);animation:rot .8s linear infinite;flex:0 0 auto}
@keyframes rot{to{transform:rotate(1turn)}}
.conn{width:8px;height:8px;border-radius:50%;background:var(--mut);flex:0 0 auto}
.conn.ok{background:var(--green)} .conn.err{background:var(--red)}
.conn.sync{background:var(--amber);animation:cpulse 1.1s ease-in-out infinite}
@keyframes cpulse{0%,100%{opacity:1}50%{opacity:.3}}
.gletter{position:sticky;top:calc(126px + env(safe-area-inset-top));font-size:11.5px;font-weight:700;color:var(--mut);padding:10px 4px 4px;background:var(--bg);z-index:5;letter-spacing:.6px}
</style>
</head>

<svg xmlns="http://www.w3.org/2000/svg" style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true"><defs>
<symbol id="i-mark" viewBox="0 0 24 24"><path d="M12 2.8 19 5.4v5.5c0 4.5-2.8 7.7-7 9.5-4.2-1.8-7-5-7-9.5V5.4L12 2.8Z"/><circle cx="12" cy="10.3" r="2.1"/><path d="M12 12.4v3.4"/></symbol>

<script>
"use strict";
const DEFAULT_API_URL = "https://script.google.com/macros/s/AKfycbyopmm6e_aymCbnz3phNKU9Ag-9vaXf0nQVjnn3ukOukLqSJj6oPNy5veC2KuPKuuew/exec";
const CFG_KEY="mapvault.cfg", THEME_KEY="mapvault.theme", RECENT_KEY="mapvault.recent", CACHE_KEY="mapvault.cache";
let CFG=loadJ(CFG_KEY,{}), STATE=null, IDX=null, VIEWN="home", DETAIL=null, Q="", DLFILTER="soon", LASTSTR=null;

/* ---------- utils ---------- */
function $(s){return document.querySelector(s)}
function loadJ(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}}
function saveJ(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function IC(n){return '<svg class="ic" aria-hidden="true"><use href="#i-'+n+'"/></svg>'}
const RVL=IC("eye")+"Reveal";
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("on");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("on"),1900)}
function setConn(s){$("#conn").className="conn"+(s?" "+s:"")}
function copyTxt(v){navigator.clipboard.writeText(v).then(()=>toast("Copied"),()=>toast("Copy failed"))}
function normNo(n){const s=String(n||"").replace(/\D/g,"");return s.replace(/^0+/,"")}
function normName(s){return String(s||"").toLowerCase().replace(/\b(ltd|limited|llp|plc|the)\b/g," ").replace(/[^a-z0-9]+/g," ").trim()}
function initials(s){const w=String(s||"?").split(/\s+/).filter(Boolean);return ((w[0]||"?")[0]+(w[1]?w[1][0]:"")).toUpperCase()}
function parseDMY(s){if(!s)return null;const p=String(s).split("/");if(p.length!==3)return null;const d=new Date(+p[2],+p[1]-1,+p[0]);return isNaN(d)?null:d}
function daysTo(s){const d=parseDMY(s);if(!d)return null;const t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000)}
function dueClass(days,overdue){if(overdue||days!=null&&days<0)return"red";if(days!=null&&days<=14)return"red";if(days!=null&&days<=31)return"amber";return""}
function dueNote(days,overdue){if(overdue)return"OVERDUE";if(days==null)return"";if(days<0)return Math.abs(days)+"d overdue";if(days===0)return"today";if(days===1)return"tomorrow";if(days<=60)return"in "+days+" days";return""}

/* ---------- api ---------- */
const NOTCONN='<div class="empty"><span class="big">'+IC("off")+'</span>Not connected</div>';
// Only ever send the access code to the real Apps Script host. A crafted invite link
// (?u=…) or the advanced URL field could otherwise point the code at an attacker origin.
function safeUrl(x){try{const u=new URL(x);return u.hostname==="script.google.com"?u.toString():null}catch(e){return null}}
async function api(op,payload){
  if(DEMO)return demoApi(op,payload);
  const target=safeUrl(CFG.url)||DEFAULT_API_URL;
  const u=new URL(target);
  u.searchParams.set("k",CFG.code);
  if(op)u.searchParams.set("op",op);
  if(payload)u.searchParams.set("payload",JSON.stringify(payload));
  u.searchParams.set("_",Date.now());   // bust any cached GET so data is always fresh
  let r;
  try{ r=await fetch(u.toString(),{cache:"no-store"}); }
  catch(e){ const err=new Error("network"); err.network=true; throw err; }   // offline / DNS / CORS
  const j=await r.json();
  if(!j.ok){ const err=new Error(j.error||"error"); if(/unauth|forbidden|denied/i.test(j.error||"")) err.auth=true; throw err; }
  return j;
}
/* Load flow: if this device has cached data we paint it INSTANTLY and refresh in the
   background (stale-while-revalidate — the backend rebuilds the payload from the sheet
   on every call, which can take ~20-30s). The cache holds only the MASKED bulk payload
   (secrets stay "•••" server-side), but it does include client contact PII, so it is
   dropped when the code/URL changes AND when the backend refuses the code (revoke). */
function saveCache(str){if(DEMO)return;try{localStorage.setItem(CACHE_KEY,JSON.stringify({code:CFG.code,url:CFG.url||DEFAULT_API_URL,at:Date.now(),s:str}))}catch(e){}}
function loadCache(){
  const c=loadJ(CACHE_KEY,null);
  if(!c||!c.s||c.code!==CFG.code||c.url!==(CFG.url||DEFAULT_API_URL))return null;  // different identity/backend — never reuse
  try{return {state:JSON.parse(c.s),str:c.s,at:c.at}}catch(e){return null}
}
function clearCache(){try{localStorage.removeItem(CACHE_KEY)}catch(e){}}
let LOADT=null, CONNECTING=false, STALEVIEW=false;
function renderLoading(){
  $("#view").innerHTML='<div class="card loadstat"><span class="spin"></span><div><b>Connecting to the vault…</b>'+
    '<div class="sub" id="loadmsg">Fetching the client list</div></div></div>'+
    '<div class="skel" style="margin-top:12px"></div><div class="skel" style="margin-top:12px"></div>';
  clearInterval(LOADT);
  const t0=Date.now();
  LOADT=setInterval(()=>{
    const el=document.getElementById("loadmsg");
    if(!el){clearInterval(LOADT);return}
    const s=Math.round((Date.now()-t0)/1000);
    if(s>=45)el.textContent="Still connecting ("+s+"s). The vault backend can be slow to wake — leave this open";
    else if(s>=8)el.textContent="The backend is building the data ("+s+"s). A first load takes 20-30 seconds; after this it opens instantly";
  },1000);
}
function stopLoading(){clearInterval(LOADT);LOADT=null;CONNECTING=false}
async function connect(announce){
  const wasDemo=DEMO;                              // leaving sample mode = a fresh (painting) load
  DEMO=false;
  const bg=!!STATE&&!wasDemo;                      // already showing real/cached data -> refresh quietly
  try{
    if(bg)setConn("sync");else{setConn();CONNECTING=true;renderLoading()}
    const j=await api("",null);
    const str=JSON.stringify(j.state);
    const changed=str!==LASTSTR;
    STATE=j.state;LASTSTR=str;buildIndex();saveJ(CFG_KEY,CFG);saveCache(str);
    setConn("ok");stopLoading();
    if(announce||!bg)closeConnect();               // never slam a modal the user opened during a boot refresh
    $("#who").textContent=STATE.me;
    // don't yank the screen mid-task: defer (not drop) the repaint if a revealed secret is on show
    if(!bg||changed){ if(document.querySelector("#view .revealed")) STALEVIEW=true; else paint(); }
    if(announce)toast("Hi "+STATE.me+" — connected"+(STATE.role==="admin"?" as admin":""));
  }catch(e){
    stopLoading();
    if(wasDemo){ DEMO=true;setConn();paint();      // couldn't leave sample mode -> stay safely sandboxed
      if($("#scrim").classList.contains("on"))$("#mMsg").textContent="Couldn't connect. Check the code and try again.";
      else toast("Couldn't connect — still in sample mode");
      return; }
    setConn("err");
    const auth=!!e.auth;
    if(auth){ clearCache();STATE=null;IDX=null;LASTSTR=null;CFG.code="";saveJ(CFG_KEY,CFG);$("#who").textContent=""; }
    const msg=auth?"That access code was refused. Enter your current access code."
                  :"Couldn't reach the vault. Check your connection and try again.";
    if($("#scrim").classList.contains("on")){$("#mMsg").textContent=msg;if(!STATE)$("#view").innerHTML=NOTCONN;return}
    if(bg&&!auth){toast("Offline — showing saved data");return}   // genuine network blip: keep the cache
    $("#view").innerHTML=NOTCONN;
    showConnect(msg);
  }
}

    if(!clients.has(k))clients.set(k,{k,name:name||"",no:normNo(no)?String(no):"",c:null,dl:null,logins:[],codes:[],pension:[]});
    const c=clients.get(k);
    if(name&&(!c.name||/LIMITED|LTD/i.test(name)===false&&c.name.length<name.length===false))c.name=c.name||name;
    return c;
  }
  (d.Companies||[]).forEach(r=>{const c=client(r.companyNo,r.company||r.contact);c.c=r;if(r.company)c.name=r.company});
  (d.Deadlines||[]).forEach(r=>{const c=client(r.companyNo,r.company);c.dl=r;if(!c.name)c.name=r.company});
  // normName strips ltd/llp/plc, so two entities differing only by suffix share a key.
  // Attach related rows to ALL clients sharing the key (never silently to the wrong one)
  // and warn, rather than first-wins misattribution.
  const byName=new Map();clients.forEach(c=>{const n=normName(c.name);if(n){if(!byName.has(n))byName.set(n,[]);byName.get(n).push(c)}});
  byName.forEach((arr,n)=>{if(arr.length>1)console.warn("MAP Vault: "+arr.length+" clients share normalised name "+JSON.stringify(n)+" — related rows attached to all; disambiguate in the sheet")});
  const fanout=name=>byName.get(normName(name))||[];
  (d.Logins||[]).forEach(r=>{const cs=fanout(r.entity);if(cs.length)cs.forEach(c=>c.logins.push(r));else client("",r.entity).logins.push(r)});
  (d.PersonalCodes||[]).forEach(r=>{
    fanout(r.company).forEach(c=>c.codes.push(r));
    const pk=r.person.trim().toLowerCase();
    if(!people.has(pk))people.set(pk,{person:r.person,entries:[]});
    people.get(pk).entries.push(r);
  });
  (d.Pensions||[]).forEach(r=>{fanout(r.employer).forEach(c=>c.pension.push(r))});
  const list=[...clients.values()].filter(c=>c.name);
  list.sort((a,b)=>a.name.localeCompare(b.name));
  IDX={clients:list,byKey:new Map(list.map(c=>[c.k,c])),people:[...people.values()]};
}

function sourceTags(sources){

/* VAT next-due computed live from the stagger (so it never goes stale between the
   weekly sync and the monthly 7th deadlines). Mirrors roster.py vat_next_due(). */
const VAT_MONTHS={jan:1,january:1,feb:2,february:2,mar:3,march:3,apr:4,april:4,may:5,jun:6,june:6,
  jul:7,july:7,aug:8,august:8,sep:9,sept:9,september:9,oct:10,october:10,nov:11,november:11,dec:12,december:12};
function vatNextDue(stagger){
  if(!stagger)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const low=String(stagger).toLowerCase(),Y=today.getFullYear();
  const dueFor=(y,m)=>{let dm=m+2,dy=y;while(dm>12){dm-=12;dy++;}return new Date(dy,dm-1,7);};
  const monthEnd=(y,m)=>new Date(y,m,0);
  let ends=[];
  if(low.includes("monthly")){for(const y of[Y-1,Y,Y+1])for(let m=1;m<=12;m++)ends.push([y,m]);}
  else{
    const mm=low.match(/[a-z]+/g),endm=mm?VAT_MONTHS[mm[mm.length-1]]:null;
    if(!endm)return null;
    const cyc=[...new Set([0,1,2,3].map(i=>((endm-1+3*i)%12)+1))];
    for(const y of[Y-1,Y,Y+1])for(const m of cyc)ends.push([y,m]);
  }
  let best=null;
  for(const[y,m]of ends){const d=dueFor(y,m);if(d>=today&&(!best||d<best.due))best={due:d,pe:monthEnd(y,m)};}
  if(!best)return null;
  const f=d=>String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();
  return {due:f(best.due),periodEnd:f(best.pe)};
}
function clientVat(c){
  const r=c.c||{};
  if(r.vatStagger){const v=vatNextDue(r.vatStagger);if(v)return {due:v.due,periodEnd:v.periodEnd,stagger:r.vatStagger};}
  if(r.vatDue)return {due:r.vatDue,periodEnd:r.vatPeriodEnd||"",stagger:r.vatStagger||""};
  return null;
}

function nextDue(c){
  const cand=[];
  if(c.dl&&c.dl.status==="active"){
    if(c.dl.accountsDue)cand.push({t:"Accounts",s:c.dl.accountsDue,o:c.dl.accountsOverdue==="yes",days:daysTo(c.dl.accountsDue)});
    if(c.dl.csDue)cand.push({t:"CS",s:c.dl.csDue,o:c.dl.csOverdue==="yes",days:daysTo(c.dl.csDue)});
  }
  const vat=clientVat(c);
  if(vat)cand.push({t:"VAT",s:vat.due,o:false,days:daysTo(vat.due)});
  if(!cand.length)return null;
  cand.sort((a,b)=>(a.days??9e9)-(b.days??9e9));
  return cand[0];
}

const DLF=[["soon","Next 60 days"],["overdue","Overdue"],["acc","Accounts"],["cs","Conf. statements"],["vat","VAT"],["all","All"]];
function pillbar(mode){ // mode: "dlf" filters in place, "dlnav" jumps to the calendar
  // only the in-place Deadlines pills reflect the active filter; Home pills are plain nav
  return DLF.map(([id,l])=>'<button class="fbtn'+(mode==="dlf"&&DLFILTER===id?" on":"")+'" data-'+mode+'="'+id+'">'+esc(l)+"</button>").join("");
}
function deadlineItems(){
  const items=[];
  IDX.clients.forEach(c=>{
    const dl=c.dl;
    if(dl&&dl.status==="active"){
      if(dl.accountsDue)items.push({c,t:"acc",label:"Accounts",due:dl.accountsDue,days:daysTo(dl.accountsDue),o:dl.accountsOverdue==="yes",sub:"made up to "+(dl.accountsMadeUpTo||"—")});
      if(dl.csDue)items.push({c,t:"cs",label:"Confirmation statement",due:dl.csDue,days:daysTo(dl.csDue),o:dl.csOverdue==="yes",sub:"statement date "+(dl.csMadeUpTo||"—")});
    }
    const vat=clientVat(c);
    if(vat)items.push({c,t:"vat",label:"VAT return",due:vat.due,days:daysTo(vat.due),o:false,
      sub:(vat.stagger?vat.stagger+" · ":"")+"period end "+(vat.periodEnd||"—")});
  });
  return items;
}
function isOverdue(i){return i.o||(i.days!=null&&i.days<0)}
function dlFiltered(items){
  if(DLFILTER==="overdue")return items.filter(isOverdue);
  const up=items.filter(i=>!isOverdue(i));   // overdue = disengaged/not filing -> ignored everywhere else
  if(DLFILTER==="acc")return up.filter(i=>i.t==="acc");
  if(DLFILTER==="cs")return up.filter(i=>i.t==="cs");
  if(DLFILTER==="vat")return up.filter(i=>i.t==="vat");
  if(DLFILTER==="soon")return up.filter(i=>i.days!=null&&i.days<=60);
  return up;   // all upcoming
}

    '<div class="calgrid caldow">'+["M","T","W","T","F","S","S"].map(x=>"<div>"+x+"</div>").join("")+"</div>"+

  const p=IDX.people.find(x=>x.person===DETAIL.person);
  if(!p){DETAIL=null;paint();return}
  let h='<button class="backbtn" id="back">'+IC("arrow-l")+'Back</button><div class="card" style="margin-top:10px">'+
    '<div class="dhead"><h2>'+esc(p.person)+'</h2><div class="meta"><span class="pill gold">CH personal code holder</span></div></div><div class="dsec">';
  p.entries.forEach(pc=>{
    const pm={person:pc.person,company:pc.company};
    h+='<h3>'+esc(pc.company||"—")+'</h3>'+
      '<div class="fact"><div class="fl">Personal code</div><div class="fv">'+(pc.personalCode==="•••"?"•••••":esc(pc.personalCode||"—"))+"</div>"+
      (pc.personalCode==="•••"?(canReveal("personalCode")?'<button class="reveal" data-rev=\''+esc(JSON.stringify({tab:"PersonalCodes",match:pm,field:"personalCode"}))+'\'>'+RVL+'</button>':'<span class="lockchip">'+IC("lock")+'Admins only</span>'):"")+"</div>"+
      factRow("Verified on",pc.verifiedOn)+factRow("Email",pc.email);
  });
  h+="</div></div>";
  v.innerHTML=h;wire(v);
}

/* ---------- more ---------- */
function renderMore(v){
  let h='<div class="section"><h2>Reference sheets</h2></div><div class="card">';
  const misc=STATE.misc||{};
  Object.keys(misc).forEach((tab,i)=>{
    h+='<div class="acc" data-acc="'+i+'"><button>'+IC("file")+esc(tab)+'<span class="chev">'+IC("chev-r")+'</span></button><div class="accbody"><table class="misc">'+
      misc[tab].map(r=>"<tr>"+r.map(c=>"<td>"+esc(c)+"</td>").join("")+"</tr>").join("")+"</table></div></div>";
  });
  h+="</div>";
  if(STATE.miscSecret&&STATE.miscSecret.length){
    h+='<div class="section"><h2>Credential sheets (admin)</h2></div><div class="card" style="padding-top:12px">';
    STATE.miscSecret.forEach(msec=>{
      h+='<div class="locked"><span>'+IC("lock")+'<b>'+esc(msec.tab)+'</b> · '+msec.rows+' rows</span><button class="btn sm" data-misc="'+esc(msec.tab)+'">Open</button></div>';
    });
    h+="</div>";
  }
  h+='<div class="section"><h2>This device</h2></div><div class="card" style="padding:14px 16px;font-size:14px">'+
    'Signed in as <b>'+esc(STATE.me)+'</b> <span class="badge '+(STATE.role==="admin"?"admin":"")+'">'+esc(STATE.role)+'</span>'+
    '<div style="color:var(--mut);font-size:13px;margin-top:6px">Client data synced '+esc(STATE.lastSync||"—")+
    (chRefreshed()?" · CH deadlines refreshed "+esc(chRefreshed()):"")+
    '</div><div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">'+
    '<button class="btn" id="reloadBtn">'+IC("refresh")+'Reload</button><button class="btn" id="reconnBtn">Change code</button></div>'+
    '<div style="color:var(--mut);font-size:12px;margin-top:12px">Client info is saved on this device so the vault opens instantly; codes and passwords are never saved; they stay masked until revealed, and every reveal is logged with your name.</div></div>';
  v.innerHTML=h;wire(v);
}

/* ---------- wiring ---------- */
function openClient(k){
  DETAIL={k};
  const rec=loadJ(RECENT_KEY,[]).filter(x=>x!==k);rec.unshift(k);saveJ(RECENT_KEY,rec.slice(0,6));
  window.scrollTo(0,0);paint();
}
function wire(v){
  v.querySelectorAll("[data-open]").forEach(el=>el.onclick=()=>openClient(el.dataset.open));
  v.querySelectorAll("[data-person]").forEach(el=>el.onclick=()=>{DETAIL={person:el.dataset.person};window.scrollTo(0,0);paint()});
  v.querySelectorAll("[data-nav]").forEach(el=>el.onclick=()=>{VIEWN=el.dataset.nav;DETAIL=null;if(el.dataset.f)DLFILTER=el.dataset.f;paint()});
  v.querySelectorAll("[data-dlf]").forEach(el=>el.onclick=()=>{DLFILTER=el.dataset.dlf;CAL.sel=null;paint()});
  v.querySelectorAll("[data-dlnav]").forEach(el=>el.onclick=()=>{DLFILTER=el.dataset.dlnav;CAL.sel=null;VIEWN="deadlines";DETAIL=null;window.scrollTo(0,0);paint()});
  v.querySelectorAll("[data-cal]").forEach(el=>el.onclick=()=>{
    const d=+el.dataset.cal;CAL.sel=null;
    if(d===0){const n=new Date();CAL.y=n.getFullYear();CAL.m=n.getMonth()}
    else{CAL.m+=d;if(CAL.m<0){CAL.m=11;CAL.y--}if(CAL.m>11){CAL.m=0;CAL.y++}}
    paint();
  });
  v.querySelectorAll("[data-day]").forEach(el=>el.onclick=()=>{CAL.sel=CAL.sel===el.dataset.day?null:el.dataset.day;paint()});
  v.querySelectorAll("[data-calclear]").forEach(el=>el.onclick=()=>{CAL.sel=null;paint()});
  // keyboard access: the drill-down rows/days are click-only DIVs — make them focusable buttons
  v.querySelectorAll("[data-open],[data-person],[data-day]").forEach(el=>{
    if(el.tagName==="DIV"){el.tabIndex=0;el.setAttribute("role","button");
      el.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();el.click()}});}
  });
  v.querySelectorAll("[data-copy]").forEach(b=>b.onclick=e=>{e.stopPropagation();copyTxt(b.dataset.copy)});
  const back=v.querySelector("#back");if(back)back.onclick=()=>{DETAIL=null;paint()};
  v.querySelectorAll("[data-acc]").forEach(a=>{a.querySelector("button").onclick=()=>a.classList.toggle("open")});
  v.querySelectorAll("[data-rev]").forEach(b=>b.onclick=async e=>{
    e.stopPropagation();
    b.textContent="…";b.disabled=true;
    try{
      const q=JSON.parse(b.dataset.rev);
      const j=await api("reveal",q);
      const cell=b.closest(".fact").querySelector(".fv");
      cell.innerHTML='<span class="revealed">'+esc(j.value)+"</span>";
      const cp=document.createElement("button");cp.className="copy";cp.setAttribute("aria-label","Copy");cp.innerHTML=IC("copy");cp.onclick=()=>copyTxt(j.value);
      b.replaceWith(cp);
      setTimeout(()=>{if(!cell.isConnected)return;cell.textContent="•••••";b.innerHTML=RVL;b.disabled=false;cp.replaceWith(b);toast("Hidden again");
        if(STALEVIEW&&!document.querySelector("#view .revealed"))paint()},45000);   // deferred background refresh
    }catch(err){b.innerHTML=RVL;b.disabled=false;toast(err.message||"Failed")}
  });
  v.querySelectorAll("[data-misc]").forEach(b=>b.onclick=async()=>{
    b.textContent="…";b.disabled=true;
    try{
      const j=await api("revealMisc",{tab:b.dataset.misc});
      const div=document.createElement("div");div.className="accbody";div.style.display="block";div.style.padding="0 16px 14px";
      div.innerHTML='<table class="misc">'+j.rows.map(r=>"<tr>"+r.map(c=>"<td>"+esc(c)+"</td>").join("")+"</tr>").join("")+"</table>";
      b.closest(".locked").after(div);b.remove();
    }catch(err){b.textContent="Open";b.disabled=false;toast(err.message||"Failed")}
  });
  const rl=v.querySelector("#reloadBtn");if(rl)rl.onclick=()=>connect(true);
  const rc=v.querySelector("#reconnBtn");if(rc)rc.onclick=()=>showConnect();
}
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{VIEWN=b.dataset.v;DETAIL=null;CAL.sel=null;Q="";$("#q").value="";$("#qclear").style.display="none";window.scrollTo(0,0);paint()});

/* ---------- search ---------- */
let qt;
$("#q").addEventListener("input",e=>{
  clearTimeout(qt);
  qt=setTimeout(()=>{Q=e.target.value.trim();$("#qclear").style.display=Q?"block":"none";if(DETAIL)DETAIL=null;paint()},110);
});
$("#qclear").onclick=()=>{Q="";$("#q").value="";$("#qclear").style.display="none";paint()};

/* ---------- connect modal ---------- */
function showConnect(msg){
  $("#mMsg").textContent=msg||"Paste your personal access code (from your invite link). It stays on this device only.";
  $("#mUrl").value=CFG.url||DEFAULT_API_URL;
  $("#mCode").value=CFG.code||"";
  $("#scrim").classList.add("on");
}
function closeConnect(){$("#scrim").classList.remove("on")}
$("#mCancel").onclick=closeConnect;
$("#mDemo").onclick=startDemo;
$("#mConnect").onclick=()=>{
  const code=$("#mCode").value.trim(), raw=$("#mUrl").value.trim();
  if(!code){toast("Access code needed");return}
  if(raw&&!safeUrl(raw)){toast("That web app URL isn't a script.google.com address");return}
  const url=safeUrl(raw)||DEFAULT_API_URL;
  if(code!==CFG.code||url!==CFG.url){clearCache();STATE=null;IDX=null;DETAIL=null;LASTSTR=null}
  CFG.code=code;CFG.url=url;
  saveJ(CFG_KEY,CFG);connect(true);
};

/* ---------- theme + boot ---------- */
$("#themeBtn").onclick=()=>{
  const cur=document.documentElement.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  const nx=cur==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",nx);localStorage.setItem(THEME_KEY,nx);
};
(function boot(){
  const s=localStorage.getItem(THEME_KEY);if(s)document.documentElement.setAttribute("data-theme",s);
  const p=new URLSearchParams(location.search);
  if(p.get("k")){
    const nurl=safeUrl(p.get("u"))||DEFAULT_API_URL;   // ignore any non-Google ?u= origin
    if(p.get("k")!==CFG.code||nurl!==CFG.url)clearCache();
    CFG.code=p.get("k");CFG.url=nurl;saveJ(CFG_KEY,CFG);history.replaceState({},"",location.pathname)
  }
  if(p.has("demo")){startDemo();return}
  if(!CFG.code){showConnect();return}
  const c=loadCache();
  if(c){                       // instant open from this device's last load, refresh behind it
    STATE=c.state;LASTSTR=c.str;buildIndex();
    $("#who").textContent=STATE.me;setConn("sync");paint();
  }
  connect(false);
})();
</script>

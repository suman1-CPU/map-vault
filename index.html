<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<title>MAP Vault · Client workspace</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f3f4f1">
<link rel="preconnect" href="https://script.google.com" crossorigin>
<link rel="preconnect" href="https://script.googleusercontent.com" crossorigin>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='15' fill='%23145c4b'/><path d='M32 12l14 5v11c0 9-5.7 15.4-14 19-8.3-3.6-14-10-14-19V17l14-5Z' fill='none' stroke='white' stroke-width='4' stroke-linejoin='round'/><circle cx='32' cy='27' r='4' fill='white'/><path d='M32 31v8' stroke='white' stroke-width='4' stroke-linecap='round'/></svg>">
<style>
/* MAP Vault — single-file client. System fonts, inline SVG icons, no external requests. */
:root{
  --bg:#f4f5f7; --card:#ffffff; --ink:#191d26; --mut:#5f6b7e; --line:#e4e6eb;
  --accent:#3a56d4; --accent-soft:#eceffb; --accent-ink:#ffffff;
  --chip:#eef0f4; --red:#c93a2c; --redbg:#faeae7; --amber:#96610a; --amberbg:#f7efdc;
  --green:#1d7a46; --greenbg:#e3f2e8; --gold:#8a6d1a; --goldbg:#f6efd8;
  --shadow:0 1px 2px rgba(18,22,33,.05),0 4px 14px rgba(18,22,33,.05);
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --navh:64px;
  color-scheme:light;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.45;
  -webkit-font-smoothing:antialiased;padding-bottom:calc(var(--navh) + env(safe-area-inset-bottom));}
button{font:inherit;color:inherit;cursor:pointer}
input{font:inherit;color:var(--ink)}
input::placeholder{color:var(--mut);opacity:.7}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
::selection{background:var(--accent-soft)}
:is(button,summary,a):focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}
.row:focus-visible,.cd:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;border-radius:10px}

/* ---------- icons ---------- */
.ic{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto;display:block}

/* ---------- header ---------- */
header{position:sticky;top:0;z-index:30;background:var(--card);border-bottom:1px solid var(--line);
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;display:flex;align-items:center;gap:10px}
.logo{display:flex;color:var(--accent)}
.logo .ic{width:23px;height:23px;stroke-width:1.6}
h1{font-size:16.5px;margin:0;font-weight:700;letter-spacing:-.01em}
.grow{flex:1}
.badge{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--chip);color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
.badge.admin{background:var(--accent);color:var(--accent-ink)}
.iconbtn{border:1px solid var(--line);background:var(--card);border-radius:9px;width:38px;height:38px;flex:0 0 auto;display:grid;place-items:center;color:var(--mut)}
.iconbtn .ic{width:17px;height:17px}
#who{font-size:12.5px;color:var(--mut);font-weight:500}

/* ---------- search ---------- */
.searchwrap{position:sticky;top:calc(59px + env(safe-area-inset-top));z-index:25;background:var(--bg);padding:12px 16px 8px;max-width:760px;margin:0 auto}
.searchbox{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 14px}
.searchbox:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.searchbox>.ic{width:18px;height:18px;color:var(--mut)}
.searchbox input{flex:1;border:none;outline:none;background:none;font-size:16px;min-width:0}
.searchbox .clear{border:none;background:var(--chip);border-radius:50%;width:26px;height:26px;color:var(--mut);display:none;position:relative;padding:0;flex:0 0 auto}
.searchbox .clear .ic{width:12px;height:12px;position:absolute;inset:0;margin:auto;stroke-width:2}

/* ---------- layout ---------- */
.wrap{max-width:760px;margin:0 auto;padding:8px 16px 40px}
.section{margin:20px 0 8px;display:flex;align-items:baseline;gap:8px}
.section h2{font-size:11.5px;margin:0;color:var(--mut);font-weight:650;text-transform:uppercase;letter-spacing:.8px}
.count2{margin-left:auto;font-size:12px;color:var(--mut);font-weight:650;font-variant-numeric:tabular-nums}

/* ---------- cards & rows ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
.rowlist .row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer}
.rowlist .row:last-child{border-bottom:none}
.rowlist .row:active{background:var(--chip)}
@media(hover:hover){.rowlist .row:hover{background:var(--chip)}}
.row .avatar{width:38px;height:38px;border-radius:10px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:650;font-size:13.5px;flex:0 0 auto}
.row .avatar.cs{background:var(--amberbg);color:var(--amber)} .row .avatar.vat{background:var(--greenbg);color:var(--green)}
.row .rmain{flex:1;min-width:0}
.row .rname{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.006em}
.row .rsub{font-size:12px;color:var(--mut);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.chev{display:flex;align-items:center;color:var(--mut);flex:0 0 auto}
.chev .ic{width:15px;height:15px;stroke-width:2;opacity:.7}
.pill{font-size:11.5px;font-weight:650;padding:4px 8px;border-radius:6px;background:var(--chip);color:var(--mut);white-space:nowrap;flex:0 0 auto;font-variant-numeric:tabular-nums}
.pill.red{background:var(--redbg);color:var(--red)}
.pill.amber{background:var(--amberbg);color:var(--amber)}
.pill.green{background:var(--greenbg);color:var(--green)}
.pill.gold{background:var(--goldbg);color:var(--gold)}
/* list rows: urgency as quiet colored text, not filled chips — red stays loud only when rare */
.rowlist .row>.pill{background:transparent;padding:0 2px;font-size:12px;font-weight:650}
.muted{color:var(--mut)}

/* ---------- dossier ---------- */
.dhead{padding:18px 16px 14px;border-bottom:1px solid var(--line)}
.dhead h2{margin:0 0 6px;font-size:19px;line-height:1.25;font-weight:700;letter-spacing:-.012em}
.dhead .meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:13px;color:var(--mut)}
.mono{font-family:var(--mono)}
.dsec{padding:6px 16px 14px}
.dsec h3{font-size:11.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin:18px 0 6px;font-weight:650}
.fact{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.fact:last-child{border-bottom:none}
.fact .fl{width:118px;flex:0 0 auto;font-size:12.5px;color:var(--mut);font-weight:550}
.fact .fv{flex:1;min-width:0;font-family:var(--mono);font-size:13.5px;word-break:break-word}
.fact .fv.plain{font-family:var(--sans);font-size:14px}
.copy{border:none;background:var(--chip);border-radius:8px;width:30px;height:30px;display:grid;place-items:center;padding:0;color:var(--mut);flex:0 0 auto}
.copy .ic{width:14.5px;height:14.5px}
.copy:active{background:var(--accent-soft);color:var(--accent)}
@media(hover:hover){.copy:hover{background:var(--accent-soft);color:var(--accent)}}
.reveal{border:none;background:var(--goldbg);color:var(--gold);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:650;flex:0 0 auto;display:inline-flex;align-items:center;gap:6px}
.reveal .ic{width:15px;height:15px}
.reveal:disabled{opacity:.6;cursor:default}
@media(hover:hover){.reveal:hover{filter:brightness(.96)}}
.lockchip{font-size:12px;color:var(--mut);background:var(--chip);border-radius:7px;padding:6px 10px;flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;font-weight:550}
.lockchip .ic{width:13px;height:13px}
.revealed{background:var(--goldbg);color:var(--gold);border-radius:6px;padding:2px 7px}
.dueband{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px 4px}
.duecard{border:1px solid var(--line);border-radius:10px;padding:11px 13px;background:transparent}
.duecard .dl{font-size:11px;color:var(--mut);font-weight:650;text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:6px}
.duecard .dl .ic{width:14px;height:14px;stroke-width:2}
.duecard .dv{font-size:17px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.duecard .dn{font-size:12px;color:var(--mut);margin-top:2px}
.duecard.red{border-color:var(--redbg)} .duecard.red .dv,.duecard.red .dl,.duecard.red .dn b{color:var(--red)}
.duecard.amber{border-color:var(--amberbg)} .duecard.amber .dv,.duecard.amber .dl,.duecard.amber .dn b{color:var(--amber)}
.srcnote{padding:2px 16px 14px;font-size:11.5px;color:var(--mut)}
.backbtn{border:none;background:none;color:var(--accent);font-weight:600;font-size:14.5px;padding:14px 16px 0;display:flex;align-items:center;gap:6px}
.backbtn .ic{width:17px;height:17px}

/* ---------- bottom nav ---------- */
nav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--card);border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:6px 8px calc(6px + env(safe-area-inset-bottom))}
nav button{flex:1;max-width:120px;border:none;background:none;color:var(--mut);font-size:10.5px;font-weight:600;letter-spacing:.1px;
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;border-radius:12px}
nav button .ni{display:flex;align-items:center;justify-content:center;padding:3px 12px;border-radius:99px}
nav button .ni .ic{width:21px;height:21px}
nav button.on{color:var(--accent)}
nav button.on .ni{background:var(--accent-soft)}
@media(hover:hover){nav button:not(.on):hover{color:var(--ink)}}

/* ---------- filters ---------- */
.filters{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.fbtn{border:1px solid var(--line);background:var(--card);color:var(--mut);border-radius:8px;padding:7px 13px;font-size:13px;font-weight:600;white-space:nowrap}
.fbtn.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
@media(hover:hover){.fbtn:not(.on):hover{color:var(--ink);border-color:var(--mut)}}

/* ---------- buttons ---------- */
.btn{font-weight:600;border:1px solid var(--line);background:var(--card);border-radius:9px;padding:10px 15px;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:7px}
.btn .ic{width:15px;height:15px}
.btn.primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.btn.sm{padding:6px 11px;font-size:12.5px;border-radius:8px}
@media(hover:hover){.btn:hover{background:var(--chip)}.btn.primary:hover{background:var(--accent);filter:brightness(1.07)}}

/* ---------- calendar ---------- */
.cal{padding:12px 12px 10px;margin-bottom:12px}
.calhead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.calhead b{font-size:15px;font-weight:650;letter-spacing:-.006em}
.calhead .iconbtn{width:32px;height:32px;border:none;background:var(--chip);border-radius:8px}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.caldow div{text-align:center;font-size:10.5px;color:var(--mut);font-weight:650;padding:2px 0;letter-spacing:.4px}
.cd{height:46px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:13px;position:relative;border:1px solid transparent;font-variant-numeric:tabular-nums;color:var(--mut)}
.cd.off{visibility:hidden}
.cd.has{cursor:pointer;font-weight:650;color:var(--ink)}
.cd.has:active{background:var(--chip)}
@media(hover:hover){.cd.has:hover{background:var(--chip)}}
.cd.today{border-color:var(--accent);color:var(--accent)}
.cd.sel{background:var(--accent);color:var(--accent-ink)}
.dots{display:flex;gap:2.5px;height:5px}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block;flex:0 0 auto}
.dot.acc{background:var(--accent)} .dot.cs{background:var(--amber)} .dot.vat{background:var(--green)} .dot.od{background:var(--red)}
.cd.sel .dot{background:var(--accent-ink)}
.more2{position:absolute;top:2px;right:4px;font-size:9px;color:var(--mut)}
.cd.sel .more2{color:var(--accent-ink)}
.callegend{display:flex;gap:14px;justify-content:center;margin-top:10px;font-size:11.5px;color:var(--mut);flex-wrap:wrap}
.callegend .dot{margin-right:4px}
.selday{display:flex;align-items:center;gap:8px;margin:2px 0 8px;font-size:13px;color:var(--mut);font-weight:600}
.selday button{border:none;background:var(--chip);border-radius:50%;width:22px;height:22px;color:var(--mut);position:relative;padding:0;flex:0 0 auto}
.selday button .ic{width:10px;height:10px;position:absolute;inset:0;margin:auto;stroke-width:2.25}

/* ---------- reference sheets ---------- */
.acc{border-bottom:1px solid var(--line)}
.acc:last-child{border-bottom:none}
.acc>button{width:100%;border:none;background:none;text-align:left;padding:14px 16px;font-size:14.5px;font-weight:600;display:flex;align-items:center;gap:10px}
.acc>button>.ic{width:18px;height:18px;color:var(--mut)}
.acc .chev{margin-left:auto;transition:transform .15s}
.acc.open .chev{transform:rotate(90deg)}
.accbody{display:none;padding:0 16px 14px;overflow-x:auto}
.acc.open .accbody{display:block}
table.misc{width:100%;border-collapse:collapse;font-size:12.5px}
table.misc td{border:none;border-bottom:1px solid var(--line);padding:8px 10px 8px 0;vertical-align:top;font-family:var(--mono)}
table.misc tr:last-child td{border-bottom:none}
table.misc td:first-child{color:var(--mut);font-family:var(--sans);font-size:12px}
.locked{border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:var(--ink);background:var(--bg);font-size:13.5px;display:flex;justify-content:space-between;align-items:center;gap:10px;margin:0 16px 12px}
.locked>span{display:flex;align-items:center;gap:8px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--mut)}
.locked b{color:var(--ink);font-weight:600}
.locked .ic{width:15px;height:15px;color:var(--gold)}

/* ---------- modal / toast / empty ---------- */
.scrim{position:fixed;inset:0;background:rgba(9,11,16,.55);display:none;align-items:flex-end;justify-content:center;z-index:60;padding:0}
.scrim.on{display:flex}
@media(min-width:640px){.scrim{align-items:center;padding:16px}}
.modal{background:var(--card);border:1px solid var(--line);border-radius:16px 16px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));max-width:460px;width:100%;box-shadow:var(--shadow);max-height:92dvh;overflow-y:auto}
@media(min-width:640px){.modal{border-radius:16px;padding-bottom:22px}}
.modal h2{margin:0 0 6px;font-size:17px;font-weight:700;letter-spacing:-.01em}
.modal p{color:var(--mut);font-size:13.5px;margin:0 0 16px}
.modal summary{font-size:13px;color:var(--mut);cursor:pointer}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--mut);margin-bottom:5px}
.field input{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px;background:var(--bg);outline:none;font-size:16px}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.toast{position:fixed;bottom:calc(var(--navh) + 14px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 16px;border-radius:10px;font-size:13.5px;font-weight:550;z-index:80;opacity:0;transition:opacity .2s;pointer-events:none;max-width:88vw;text-align:center;box-shadow:var(--shadow)}
.toast.on{opacity:1}
.empty{text-align:center;color:var(--mut);padding:48px 20px;font-size:14.5px}
.empty .big{display:flex;justify-content:center;margin-bottom:10px}
.empty .big .ic{width:32px;height:32px;stroke-width:1.5;opacity:.75}
.skel{height:110px;border-radius:12px;background:linear-gradient(100deg,var(--chip) 40%,var(--card) 50%,var(--chip) 60%);background-size:200% 100%;animation:sh 1.2s infinite}
@keyframes sh{to{background-position:-200% 0}}
.loadstat{display:flex;align-items:center;gap:13px;padding:15px 16px;margin-top:14px;font-size:14px}
.loadstat b{font-weight:650}
.loadstat .sub{font-size:12.5px;color:var(--mut);margin-top:2px}
.spin{width:20px;height:20px;border-radius:50%;border:2.5px solid var(--line);border-top-color:var(--accent);animation:rot .8s linear infinite;flex:0 0 auto}
@keyframes rot{to{transform:rotate(1turn)}}
.conn{width:8px;height:8px;border-radius:50%;background:var(--mut);flex:0 0 auto}
.conn.ok{background:var(--green)} .conn.err{background:var(--red)}
.conn.sync{background:var(--amber);animation:cpulse 1.1s ease-in-out infinite}
@keyframes cpulse{0%,100%{opacity:1}50%{opacity:.3}}
.gletter{position:sticky;top:calc(126px + env(safe-area-inset-top));font-size:11.5px;font-weight:700;color:var(--mut);padding:10px 4px 4px;background:var(--bg);z-index:5;letter-spacing:.6px}

/* ---------- v2 write layer: FAB, forms, wizard, edit, changes ---------- */
.fab{position:fixed;right:16px;bottom:calc(var(--navh) + 14px + env(safe-area-inset-bottom));z-index:45;
  background:var(--accent);color:var(--accent-ink);border:none;border-radius:99px;height:50px;padding:0 20px 0 16px;
  display:flex;align-items:center;gap:8px;font-size:14.5px;font-weight:650;box-shadow:0 4px 16px rgba(58,86,212,.4)}
.fab .ic{width:20px;height:20px;stroke-width:2.2}
@media(hover:hover){.fab:hover{filter:brightness(1.07)}}
.linkbtn{background:none;border:none;color:var(--accent);font-size:13px;font-weight:600;padding:6px 0;display:inline-flex;align-items:center;gap:6px}
.linkbtn.mut{color:var(--mut)}
.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px;background:var(--bg);outline:none;font-size:16px;font-family:inherit}
.field textarea:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.field textarea{min-height:64px;resize:vertical}
.field .hint{font-size:11.5px;color:var(--mut);margin-top:4px;font-weight:400}
.field.lock input,.field.lock textarea{opacity:.55;pointer-events:none;background:var(--chip)}
.frow{display:flex;gap:10px}.frow>.field{flex:1;min-width:0}
.steps{display:flex;gap:6px;margin-bottom:14px}
.steps .st{flex:1;height:4px;border-radius:2px;background:var(--line)}
.steps .st.on{background:var(--accent)}
.pickrow{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer;background:var(--bg)}
.pickrow:active{background:var(--chip)}
@media(hover:hover){.pickrow:hover{border-color:var(--accent)}}
.pickrow .pmain{flex:1;min-width:0}
.pickrow .pn{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pickrow .ps{font-size:12px;color:var(--mut);font-family:var(--mono)}
.namechips{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 14px}
.namechips button{border:1px solid var(--line);background:var(--bg);border-radius:99px;padding:9px 16px;font-size:14px;font-weight:600}
.namechips button:active{background:var(--chip)}
@media(hover:hover){.namechips button:hover{border-color:var(--accent);color:var(--accent)}}
.editpen{margin-left:auto;border:1px solid var(--line);background:var(--card);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;color:var(--mut);display:inline-flex;align-items:center;gap:5px}
.editpen .ic{width:13px;height:13px}
@media(hover:hover){.editpen:hover{color:var(--accent);border-color:var(--accent)}}
.h3row{display:flex;align-items:center;margin:18px 0 6px}
.h3row h3{margin:0}
.acctgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:2px 0 4px}
.acctcell{border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:transparent}
.acctcell .al{font-size:10.5px;color:var(--mut);font-weight:650;text-transform:uppercase;letter-spacing:.5px}
.acctcell .av{font-size:14px;font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums;word-break:break-word}
.chgrow{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);font-size:13px}
.chgrow:last-child{border-bottom:none}
.chgrow .ct{font-family:var(--mono);font-size:11px;color:var(--mut);flex:0 0 auto;width:74px}
.chgrow .cop{font-weight:650}
.chgrow .cop.add{color:var(--green)}.chgrow .cop.remove{color:var(--red)}.chgrow .cop.update{color:var(--accent)}.chgrow .cop.restore{color:var(--gold)}
.tag{font-size:11px;font-weight:650;padding:2px 7px;border-radius:6px;background:var(--chip);color:var(--mut)}
.tag.vault{background:var(--accent-soft);color:var(--accent)}
.pill .ic{width:12px;height:12px;vertical-align:-2px;display:inline-block}
.pill.mut{background:var(--chip);color:var(--mut)}
.stagegrid{display:flex;flex-wrap:wrap;gap:7px;margin:6px 0 12px}
.stagegrid button{border:1px solid var(--line);background:var(--bg);border-radius:99px;padding:8px 13px;font-size:13px;font-weight:600;color:var(--mut)}
.stagegrid button.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
@media(hover:hover){.stagegrid button:not(.on):hover{border-color:var(--accent);color:var(--accent)}}
.ownerrow{display:flex;flex-wrap:wrap;gap:7px;margin:6px 0 12px}
.ownerrow button{border:1px solid var(--line);background:var(--bg);border-radius:99px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--mut)}
.ownerrow button.on{background:var(--ink);border-color:var(--ink);color:var(--bg)}
.possible{border:1px dashed var(--line);border-radius:10px;padding:10px 12px;margin:8px 0;font-size:13px}
.possible .why{font-size:11.5px;color:var(--mut);margin-top:2px}

/* ---------- v8: practice workspace redesign ---------- */
:root{
  --bg:#f3f4f1;--card:#ffffff;--ink:#17201d;--mut:#68726d;--line:#dfe4df;
  --accent:#145c4b;--accent-soft:#e4f0ec;--accent-ink:#ffffff;--chip:#eef1ee;
  --red:#a43a31;--redbg:#f7e8e5;--amber:#8a5a13;--amberbg:#f7eedc;
  --green:#21734f;--greenbg:#e3f1e9;--gold:#76601b;--goldbg:#f3edd8;
  --shadow:0 1px 2px rgba(21,32,28,.04),0 8px 24px rgba(21,32,28,.055);
  --navw:228px;--navh:72px;
}
body{font-size:15px;background:
  linear-gradient(180deg,color-mix(in srgb,var(--accent-soft) 24%,transparent) 0,transparent 220px),var(--bg)}
header{height:64px;padding:10px 16px;background:color-mix(in srgb,var(--card) 94%,transparent);backdrop-filter:blur(14px)}
.logo{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:var(--accent);color:var(--accent-ink)}
.logo .ic{width:21px;height:21px}
.brandcopy{display:flex;flex-direction:column;line-height:1.1}
.brandcopy h1{font-size:15px;letter-spacing:-.01em}
.brandcopy small{font-size:10.5px;color:var(--mut);font-weight:650;margin-top:3px;letter-spacing:.05em;text-transform:uppercase}
.userbox{display:flex;align-items:center;gap:8px;padding:5px 9px 5px 7px;border:1px solid var(--line);background:var(--card);border-radius:10px}
.useravatar{width:27px;height:27px;border-radius:8px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);font-size:11px;font-weight:800}
#who{font-size:12px;max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iconbtn{border-radius:10px;background:var(--card)}

.searchwrap{top:calc(64px + env(safe-area-inset-top));padding:12px 16px 7px;max-width:1080px}
.searchbox{border-radius:11px;padding:12px 14px;box-shadow:0 1px 1px rgba(20,32,27,.02)}
.searchbox input{font-size:15px}
.wrap{max-width:1080px;padding:8px 16px 48px}
.card{border-radius:12px;box-shadow:var(--shadow)}
.section{margin:20px 0 9px}
.section h2{font-size:11px;letter-spacing:.09em}
.count2{background:var(--chip);border-radius:99px;padding:2px 8px;font-size:11px}

.pageintro{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:14px 0 16px}
.pageintro h2{font-size:25px;line-height:1.15;letter-spacing:-.035em;margin:3px 0 4px;font-weight:720}
.pageintro p{margin:0;color:var(--mut);font-size:13.5px;max-width:620px}
.eyebrow{color:var(--accent);font-size:10.5px;font-weight:750;text-transform:uppercase;letter-spacing:.11em}

.metricgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px;margin-bottom:15px}
.metric{position:relative;text-align:left;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:13px;min-height:88px;box-shadow:var(--shadow)}
.metric:hover{border-color:color-mix(in srgb,var(--accent) 35%,var(--line));text-decoration:none}
.metric .mlabel{display:block;font-size:11.5px;color:var(--mut);font-weight:650}
.metric .mvalue{display:block;font-size:25px;line-height:1;margin-top:9px;font-weight:740;letter-spacing:-.04em;font-variant-numeric:tabular-nums}
.metric .mnote{position:absolute;right:12px;bottom:12px;font-size:10.5px;color:var(--mut)}
.metric.urgent .mvalue{color:var(--red)}
.metric.vat .mvalue{color:var(--green)}
.metric.accounts .mvalue{color:var(--accent)}

.filters{gap:7px;padding:1px 0 11px}
.fbtn{border-radius:9px;padding:8px 12px;font-size:12.5px;background:var(--card)}
.fbtn.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}

.dategroups{display:grid;gap:12px}
.dategroup{border:1px solid var(--line);border-radius:13px;background:var(--card);box-shadow:var(--shadow);overflow:hidden}
.datehead{display:flex;align-items:center;gap:10px;padding:10px 13px;background:color-mix(in srgb,var(--chip) 55%,var(--card));border-bottom:1px solid var(--line)}
.datehead .daybox{width:39px;height:39px;border-radius:9px;display:grid;place-items:center;background:var(--accent);color:var(--accent-ink);font-size:16px;font-weight:760;font-variant-numeric:tabular-nums}
.datehead .datecopy{min-width:0}
.datehead .datecopy b{display:block;font-size:13px}
.datehead .datecopy span{display:block;color:var(--mut);font-size:11.5px;margin-top:1px}
.datehead .count2{margin-left:auto}
.dategroup .rowlist{box-shadow:none;border:none;border-radius:0}

.rowlist .row{padding:11px 13px;min-height:62px}
.row .avatar{width:36px;height:36px;border-radius:9px;font-size:12.5px}
.row .rname{font-size:14px;font-weight:650}
.row .rsub{font-family:var(--sans);font-size:11.5px;margin-top:2px}
.rowlist .row>.pill{font-size:11.5px;text-align:right}
.stagechip{max-width:170px;overflow:hidden;text-overflow:ellipsis}

.listhead{display:none;color:var(--mut);font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;padding:0 13px 7px}
.clientbook{display:grid;gap:10px}
.gletter{position:relative;top:auto;padding:8px 2px 2px;background:transparent;color:var(--accent)}

.dhead{padding:20px 18px 16px}
.dhead h2{font-size:23px;letter-spacing:-.03em}
.dhead .meta{gap:7px}
.dueband{padding:15px 18px 6px;gap:9px}
.duecard{padding:12px 13px;background:color-mix(in srgb,var(--bg) 46%,var(--card));border-radius:11px}
.duecard .dv{font-size:18px}
.dsec{padding:6px 18px 18px}
.dsec h3{font-size:10.5px;letter-spacing:.1em;margin-top:22px}
.fact{padding:10px 0}
.fact .fl{width:145px;font-size:12px}
.fact .fv{font-size:13px}
.acctgrid{gap:8px}
.acctcell{border-radius:10px;background:color-mix(in srgb,var(--bg) 52%,var(--card))}
.backbtn{padding-left:2px}
.reveal{background:var(--goldbg);border:1px solid color-mix(in srgb,var(--gold) 25%,transparent)}

.cal{padding:16px;margin-top:2px}
.calhead{margin-bottom:12px}
.calhead b{font-size:17px}
.cd{height:62px}
.calgrid{gap:5px}
.callegend{padding-top:4px;border-top:1px solid var(--line);margin-top:13px}

.fab{height:46px;border-radius:11px;padding:0 16px;box-shadow:0 8px 22px color-mix(in srgb,var(--accent) 28%,transparent)}
.modal{border-radius:18px 18px 0 0}
.modal h2{font-size:20px;letter-spacing:-.025em}
.btn{border-radius:9px}
.btn.primary{background:var(--accent);border-color:var(--accent)}

@media(max-width:639px){
  .userbox{border:none;background:transparent;padding:0}
  .useravatar,#who{display:none}
  .filters{flex-wrap:wrap;overflow-x:visible}
  .pageintro h2{font-size:22px}
  .pageintro p{font-size:12.5px}
  .metric{min-height:82px;padding:12px}
  .metric .mvalue{font-size:23px}
  .datehead{position:relative;top:auto;z-index:1}
  .rowlist .row{align-items:flex-start}
  .rowlist .row>.stagechip{display:none}
  .rowlist .row>.pill{max-width:106px;white-space:normal;line-height:1.25;padding-top:3px}
  .fact{align-items:flex-start;flex-wrap:wrap}
  .fact .fl{width:100%;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em}
  .fact .fv{min-width:0}
  .dueband{grid-template-columns:1fr!important}
}

@media(min-width:900px){
  body{padding:0 0 0 var(--navw)}
  header{height:72px;padding:12px 20px 12px 18px;left:0;right:0}
  header .logo{margin-left:0}
  header .brandcopy{min-width:170px}
  nav{top:72px;bottom:0;left:0;right:auto;width:var(--navw);height:auto;padding:22px 14px;border-top:none;border-right:1px solid var(--line);
    background:color-mix(in srgb,var(--card) 96%,transparent);display:flex;flex-direction:column;justify-content:flex-start;gap:5px}
  nav:before{content:"WORKSPACE";font-size:9.5px;letter-spacing:.13em;color:var(--mut);font-weight:750;padding:0 11px 7px}
  nav button{max-width:none;width:100%;height:43px;flex:none;flex-direction:row;justify-content:flex-start;gap:10px;padding:0 10px;border-radius:9px;font-size:13px}
  nav button .ni{padding:0;background:transparent!important}
  nav button .ni .ic{width:18px;height:18px}
  nav button.on{background:var(--accent-soft);color:var(--accent)}
  .searchwrap{top:72px;max-width:1120px;padding:18px 20px 8px}
  .wrap{max-width:1120px;padding:10px 20px 64px}
  .metricgrid{grid-template-columns:repeat(4,minmax(0,1fr));gap:11px}
  .metric{min-height:98px;padding:15px}
  .metric .mvalue{font-size:29px}
  .listhead{display:grid;grid-template-columns:minmax(260px,1fr) 180px 150px 24px;gap:12px}
  .rowlist .row{display:grid;grid-template-columns:44px minmax(250px,1fr) auto auto 18px;gap:12px;min-height:66px;padding:10px 14px}
  .row .avatar{grid-column:1}
  .row .rmain{grid-column:2}
  .row>.stagechip{grid-column:3}
  .row>.pill{grid-column:4}
  .row>.chev{grid-column:5}
  .dategroup .rowlist .row{grid-template-columns:44px minmax(280px,1fr) auto minmax(140px,auto) 18px}
  .pageintro{margin-top:18px}
  .dhead,.dueband,.dsec{padding-left:22px;padding-right:22px}
  .dsec{max-width:960px}
  .modal{border-radius:16px}
  .fab{right:24px;bottom:24px}
}
</style>

/* ---------- workflow stage model (grounded in the master sheet's real Status values) ---------- */
const STAGES=[
  ["Not Started","mut"],["Records Requested","amber"],["Emailed","amber"],["Received Statements","blue"],
  ["In Progress","blue"],["Sent Query","amber"],["Drafted","blue"],["Sent for Confirmation","gold"],
  ["Received Confirmation","green"],["Submitted","green"],["Sent Invoice","green"],["Filed","green"],
  ["Dormant","mut"],["Do Not Email","red"]
];
const CHASE_STAGES=new Set(["Records Requested","Emailed","Sent Query"]);   // auto-date on save
// Parse a free-text sheet status into {stage, sep, detail, cls}. Longest canonical
// prefix wins; anything unrecognised keeps its FULL text as detail (one-off notes
// like "Takeover received…" and Do-Not-Email routing instructions are operational
// data and must never be lost). `sep` captures the exact separator characters so
// stage+sep+detail reproduces the ORIGINAL string byte-for-byte — without it,
// "Do Not Email - Wise bank access (Dani) - statements via Wise/UBL…" would be
// silently rewritten as "Do Not Email Wise bank access…" on any save.
function parseStatus(s){
  const t=String(s||"").trim();
  if(!t)return {stage:"",sep:"",detail:"",cls:"mut"};
  const low=t.toLowerCase();
  let best=null;
  for(const [st,cls] of STAGES){ if(low.startsWith(st.toLowerCase())&&(!best||st.length>best[0].length))best=[st,cls]; }
  if(best){
    const rest=t.slice(best[0].length);
    const sep=(rest.match(/^[\s:—–-]*/)||[""])[0];
    return {stage:best[0],sep:sep,detail:rest.slice(sep.length),cls:best[1]};
  }
  return {stage:"Other",sep:"",detail:t,cls:"mut"};
}
function stageChip(status,{full=false}={}){
  const p=parseStatus(status);
  if(!p.stage)return"";
  const label=full&&p.detail?p.stage+" · "+p.detail:p.stage;
  const c=p.cls==="blue"?"":p.cls;   // blue = default accent pill
  return '<span class="pill stagechip '+esc(c)+'" title="'+esc(status)+'">'+esc(label)+"</span>";
}

/* ---------- person identity (display-layer only — reveals stay exact-match) ----------
 * CH writes "PATEL, Amitkumar Arvindbhai" / "Mr Amitkumar Patel"; the codes sheet
 * writes "Amit Patel" / "Patel Dhaval" / ALLCAPS. Exact identity = the SAME name
 * tokens in ANY order (titles stripped) — order-proof and case-proof, but never
 * merges different names. Looser similarity (Amit ~ Amitkumar) is only ever shown
 * as a labelled "possibly the same person" suggestion, never silently merged —
 * spouses/siblings share surnames and near-identical given names here.        */
const TITLES=new Set(["mr","mrs","ms","miss","dr","mx","sir"]);
function pTokens(name){
  let s=String(name||"").toLowerCase();
  const parts=s.split(",");
  if(parts.length>2)s=parts.slice(0,2).join(" ");   // "SHAH, Maitri, Mrs." -> drop trailing title
  s=s.replace(/,/g," ").replace(/\./g," ");
  return s.split(/[^a-z0-9'-]+/).map(t=>t.replace(/^['-]+|['-]+$/g,"")).filter(t=>t&&!TITLES.has(t)).sort();
}
function pKey(name){return pTokens(name).join(" ")}
function displayName(name){
  const raw=String(name||"").trim();
  const m=raw.match(/^([^,]+),\s*(.+)$/);
  if(m&&!/^(mr|mrs|ms|miss|dr)\b/i.test(m[1])){
    const rest=m[2].replace(/,\s*(mr|mrs|ms|miss|dr)\.?\s*$/i,"").trim();
    return rest+" "+m[1].trim();                    // "PATEL, Amitkumar" -> "Amitkumar PATEL"
  }
  return raw;
}
function dedupePeople(rows){
  const out=[],byK=new Map();
  rows.forEach(r=>{
    const k=pKey(r.name);
    const prev=byK.get(k);
    if(prev&&(!prev.dob||!r.dob||prev.dob===r.dob)){
      if(prev.role.indexOf(r.role)<0)prev.role="Director & PSC";
      if(!prev.idv&&r.idv)prev.idv=r.idv;
      if(!prev.dob&&r.dob)prev.dob=r.dob;
    }else{const cp=Object.assign({},r);byK.set(k,cp);out.push(cp)}
  });
  return out;
}
// Conservative similarity for the labelled suggestions section: share >=1 exact
// token AND >=1 prefix-pair (>=4 chars) among the remaining tokens.
function possiblySame(a,b){
  if(a.key===b.key)return null;
  const shared=a.tokens.filter(t=>b.tokens.includes(t));
  if(!shared.length)return null;
  for(const ta of a.tokens){ if(shared.includes(ta))continue;
    for(const tb of b.tokens){ if(shared.includes(tb))continue;
      if(ta.length>=4&&tb.length>=4&&(ta.startsWith(tb)||tb.startsWith(ta))&&ta!==tb)
        return "shares “"+shared.join("”, “")+"” · “"+ta+"” matches “"+tb+"”";
    }}
  return null;
}
function initials(s){const w=String(s||"?").split(/\s+/).filter(Boolean);return ((w[0]||"?")[0]+(w[1]?w[1][0]:"")).toUpperCase()}
function parseDMY(s){
  if(!s)return null;
  if(s instanceof Date)return isNaN(s)?null:s;
  const p=String(s).trim().split("/");
  if(p.length===3&&p.every(x=>/^\d+$/.test(x))){
    const d=new Date(+p[2],+p[1]-1,+p[0]);
    return isNaN(d)?null:d;
  }
  const d=new Date(s);
  return isNaN(d)?null:d;
}
function dateLabel(s){
  const d=parseDMY(s);
  return d?String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear():String(s||"");
}
function dateTimeLabel(s){
  const v=String(s||"").trim();
  let m=v.match(/^(\d{4})-(\d{2})-(\d{2})(?:T|\s)?(\d{2}:\d{2})?/);
  if(m)return m[3]+"/"+m[2]+"/"+m[1]+(m[4]?" "+m[4]:"");
  m=v.match(/^(\d{2})\/(\d{2})\/(\d{4})(?:T|\s)?(\d{2}:\d{2})?/);
  if(m)return m[1]+"/"+m[2]+"/"+m[3]+(m[4]?" "+m[4]:"");
  return v.slice(0,16).replace("T"," ");
}
function daysTo(s){const d=parseDMY(s);if(!d)return null;const t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000)}
function dueClass(days,overdue){if(overdue||days!=null&&days<0)return"red";if(days!=null&&days<=14)return"red";if(days!=null&&days<=31)return"amber";return""}
function dueNote(days,overdue){if(overdue)return"OVERDUE";if(days==null)return"";if(days<0)return Math.abs(days)+"d overdue";if(days===0)return"today";if(days===1)return"tomorrow";if(days<=60)return"in "+days+" days";return""}

const NOTCONN='<div class="empty"><span class="big">'+IC("off")+'</span>Not connected</div>';
// Only ever send the access code to the real Apps Script host. A crafted invite link
// (?u=…) or the advanced URL field could otherwise point the code at an attacker origin.
function safeUrl(x){try{const u=new URL(x);return u.hostname==="script.google.com"?u.toString():null}catch(e){return null}}
async function api(op,payload){
  if(DEMO)return demoApi(op,payload);
  const target=safeUrl(CFG.url)||DEFAULT_API_URL;
  let j;
  if(WRITE_OPS[op]){
    // writes ride on POST + text/plain: a CORS "simple request" (no preflight,
    // which Apps Script can't answer) that keeps secret values OUT of the URL.
    let r;
    try{ r=await fetch(target,{method:"POST",cache:"no-store",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({k:CFG.code,who:CFG.who||"",op:op,payload:payload})}); }
    catch(e){ const err=new Error("network");err.network=true;throw err; }
    j=await r.json();
  }else{
    const u=new URL(target);
    u.searchParams.set("k",CFG.code);
    if(CFG.who)u.searchParams.set("who",CFG.who);   // team tier: identify who is asking
    if(op)u.searchParams.set("op",op);
    if(payload)u.searchParams.set("payload",JSON.stringify(payload));
    u.searchParams.set("_",Date.now());   // bust any cached GET so data is always fresh
    let r;
    try{ r=await fetch(u.toString(),{cache:"no-store"}); }
    catch(e){ const err=new Error("network"); err.network=true; throw err; }   // offline / DNS / CORS
    j=await r.json();
  }
  if(!j.ok){ const err=new Error(j.error||"error"); err.data=j;
    if(/unauth|forbidden|denied/i.test(j.error||"")) err.auth=true; throw err; }
  return j;
}
/* Load flow: if this device has cached data we paint it INSTANTLY and refresh in the
   background (stale-while-revalidate — the backend rebuilds the payload from the sheet
   on every call, which can take ~20-30s). The cache holds only the MASKED bulk payload
   (secrets stay "•••" server-side), but it does include client contact PII, so it is
   dropped when the code/URL changes AND when the backend refuses the code (revoke). */
function saveCache(str){if(DEMO)return;try{localStorage.setItem(CACHE_KEY,JSON.stringify({code:CFG.code,url:CFG.url||DEFAULT_API_URL,at:Date.now(),s:str}))}catch(e){}}
function loadCache(){
  const c=loadJ(CACHE_KEY,null);
  if(!c||!c.s||c.code!==CFG.code||c.url!==(CFG.url||DEFAULT_API_URL))return null;  // different identity/backend — never reuse
  try{return {state:JSON.parse(c.s),str:c.s,at:c.at}}catch(e){return null}
}
function clearCache(){try{localStorage.removeItem(CACHE_KEY)}catch(e){}}
let LOADT=null, CONNECTING=false, STALEVIEW=false;
function renderLoading(){
  $("#view").innerHTML='<div class="card loadstat"><span class="spin"></span><div><b>Connecting to the vault…</b>'+
    '<div class="sub" id="loadmsg">Fetching the client list</div></div></div>'+
    '<div class="skel" style="margin-top:12px"></div><div class="skel" style="margin-top:12px"></div>';
  clearInterval(LOADT);
  const t0=Date.now();
  LOADT=setInterval(()=>{
    const el=document.getElementById("loadmsg");
    if(!el){clearInterval(LOADT);return}
    const s=Math.round((Date.now()-t0)/1000);
    if(s>=45)el.textContent="Still connecting ("+s+"s). The vault backend can be slow to wake — leave this open";
    else if(s>=8)el.textContent="The backend is building the data ("+s+"s). A first load takes 20-30 seconds; after this it opens instantly";
  },1000);
}
function stopLoading(){clearInterval(LOADT);LOADT=null;CONNECTING=false}
async function connect(announce){
  const wasDemo=DEMO;                              // leaving sample mode = a fresh (painting) load
  DEMO=false;
  const bg=!!STATE&&!wasDemo;                      // already showing real/cached data -> refresh quietly
  try{
    if(bg)setConn("sync");else{setConn();CONNECTING=true;renderLoading()}
    const j=await api("",null);
    const str=JSON.stringify(j.state);
    const changed=str!==LASTSTR;
    STATE=j.state;LASTSTR=str;buildIndex();saveJ(CFG_KEY,CFG);saveCache(str);
    setConn("ok");stopLoading();
    if(announce||!bg)closeConnect();               // never slam a modal the user opened during a boot refresh
    $("#who").textContent=STATE.me;
    // don't yank the screen mid-task: defer (not drop) the repaint if a revealed secret is on show
    if(!bg||changed){ if(document.querySelector("#view .revealed")) STALEVIEW=true; else paint(); }
    if(announce)toast("Hi "+STATE.me+" — connected"+(STATE.role==="admin"?" as admin":""));
  }catch(e){
    stopLoading();
    // team tier: correct password but we still need (or didn't recognise) the name
    if(e.data&&(e.data.error==="name_required"||e.data.error==="name_unknown")){
      if(!STATE&&!wasDemo)$("#view").innerHTML=NOTCONN;
      setConn();
      showConnect(e.data.error==="name_required"?"One more step — which of you is this?"
        :"That name isn't on the team list. Pick yours:", e.data.teamNames||[]);
      return;
    }
    if(e.data&&e.data.error==="locked"){ setConn("err");
      showConnect("Too many attempts. Wait a few minutes, then try again."); return; }
    if(wasDemo){ DEMO=true;setConn();paint();      // couldn't leave sample mode -> stay safely sandboxed
      if($("#scrim").classList.contains("on"))$("#mMsg").textContent="Couldn't connect. Check the code and try again.";
      else toast("Couldn't connect — still in sample mode");
      return; }
    setConn("err");
    const auth=!!e.auth;
    if(auth){ clearCache();STATE=null;IDX=null;LASTSTR=null;CFG.code="";saveJ(CFG_KEY,CFG);$("#who").textContent=""; }
    const msg=auth?"That access code was refused. Enter your current access code."
                  :"Couldn't reach the vault. Check your connection and try again.";
    if($("#scrim").classList.contains("on")){$("#mMsg").textContent=msg;if(!STATE)$("#view").innerHTML=NOTCONN;return}
    if(bg&&!auth){toast("Offline — showing saved data");return}   // genuine network blip: keep the cache
    $("#view").innerHTML=NOTCONN;
    showConnect(msg);
  }
}

/* ---------- index: join everything by client ---------- */
function buildIndex(){
  const d=STATE.data, clients=new Map(), people=new Map();
  const keyFor=(no,name)=>normNo(no)||("n:"+normName(name));
  function client(no,name){
    const k=keyFor(no,name);
    if(!clients.has(k))clients.set(k,{k,name:name||"",no:normNo(no)?String(no):"",c:null,dl:null,logins:[],codes:[],pension:[]});
    const c=clients.get(k);
    if(name&&(!c.name||/LIMITED|LTD/i.test(name)===false&&c.name.length<name.length===false))c.name=c.name||name;
    return c;
  }
  (d.Companies||[]).forEach(r=>{const c=client(r.companyNo,r.company||r.contact);c.c=r;if(r.company)c.name=r.company});
  (d.Deadlines||[]).forEach(r=>{const c=client(r.companyNo,r.company);c.dl=r;if(!c.name)c.name=r.company});
  // normName strips ltd/llp/plc, so two entities differing only by suffix share a key.
  // Attach related rows to ALL clients sharing the key (never silently to the wrong one)
  // and warn, rather than first-wins misattribution.
  const byName=new Map();clients.forEach(c=>{const n=normName(c.name);if(n){if(!byName.has(n))byName.set(n,[]);byName.get(n).push(c)}});
  byName.forEach((arr,n)=>{if(arr.length>1)console.warn("MAP Vault: "+arr.length+" clients share normalised name "+JSON.stringify(n)+" — related rows attached to all; disambiguate in the sheet")});
  const fanout=name=>byName.get(normName(name))||[];
  (d.Logins||[]).forEach(r=>{const cs=fanout(r.entity);if(cs.length)cs.forEach(c=>c.logins.push(r));else client("",r.entity).logins.push(r)});
  // The PersonalCodes company field is free text and often a LIST of shorthand
  // names ("Dev Sky , Shree Dev , Dev Bristol Ltd"). Split on , and / and attach
  // each fragment: exact normalised match first, else a UNIQUE prefix match
  // (ambiguous fragments attach nowhere — never guess between two clients).
  const allClients=[...clients.values()];
  function attachByFragment(txt){
    const out=new Set();
    String(txt||"").split(/[,\/]/).map(s=>s.trim()).filter(Boolean).forEach(frag=>{
      const n=normName(frag);
      if(!n)return;
      const exact=byName.get(n);
      if(exact){exact.forEach(c=>out.add(c));return}
      if(n.length>=4){
        const hits=allClients.filter(c=>{const cn=normName(c.name);return cn.startsWith(n+" ")||cn===n||(n.length>=6&&cn.includes(n))});
        if(hits.length===1)out.add(hits[0]);
      }
    });
    return [...out];
  }
  (d.PersonalCodes||[]).forEach(r=>{
    const pk=pKey(r.person);
    let P=null;
    if(pk){
      if(!people.has(pk))people.set(pk,{key:pk,person:displayName(r.person),tokens:pTokens(r.person),entries:[],ch:[],codeClients:new Set()});
      P=people.get(pk);P.entries.push(r);
    }
    attachByFragment(r.company).forEach(c=>{
      if(!c.codes.includes(r))c.codes.push(r);
      if(P)P.codeClients.add(c.k);
    });
  });
  // CH directors/PSCs join the SAME people index, so searching "Amit Patel" finds
  // "PATEL, Amitkumar" profiles and their companies (exact merge = identical name
  // tokens in any order; anything looser is only ever a labelled "possible match").
  (d.People||[]).forEach(r=>{
    const pk=pKey(r.name);
    if(!pk)return;
    if(!people.has(pk))people.set(pk,{key:pk,person:displayName(r.name),tokens:pTokens(r.name),entries:[],ch:[],codeClients:new Set()});
    const P=people.get(pk);
    if(!P.ch.some(x=>normNo(x.companyNo)===normNo(r.companyNo)&&x.role===r.role))P.ch.push(r);
    if(P.person.includes(",")&&!displayName(r.name).includes(","))P.person=displayName(r.name);
  });
  (d.Pensions||[]).forEach(r=>{fanout(r.employer).forEach(c=>c.pension.push(r))});
  const list=[...clients.values()].filter(c=>c.name);
  list.sort((a,b)=>a.name.localeCompare(b.name));
  // accounts info from the year-end master sheet (MasterSheet mirror), keyed by
  // normalised name so the dossier can show a client's full accounts picture.
  const master=new Map();
  (STATE.master||[]).forEach(r=>{const n=normName(r.company);if(n&&!master.has(n))master.set(n,r)});
  IDX={clients:list,byKey:new Map(list.map(c=>[c.k,c])),people:[...people.values()],master};
}

/* VAT next-due computed live from the stagger (so it never goes stale between the
   weekly sync and the monthly 7th deadlines). Mirrors roster.py vat_next_due(). */
const VAT_MONTHS={jan:1,january:1,feb:2,february:2,mar:3,march:3,apr:4,april:4,may:5,jun:6,june:6,
  jul:7,july:7,aug:8,august:8,sep:9,sept:9,september:9,oct:10,october:10,nov:11,november:11,dec:12,december:12};
function vatNextDue(stagger){
  if(!stagger)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const low=String(stagger).toLowerCase(),Y=today.getFullYear();
  const dueFor=(y,m)=>{let dm=m+2,dy=y;while(dm>12){dm-=12;dy++;}return new Date(dy,dm-1,7);};
  const monthEnd=(y,m)=>new Date(y,m,0);
  let ends=[];
  if(low.includes("monthly")){for(const y of[Y-1,Y,Y+1])for(let m=1;m<=12;m++)ends.push([y,m]);}
  else{
    const mm=low.match(/[a-z]+/g),endm=mm?VAT_MONTHS[mm[mm.length-1]]:null;
    if(!endm)return null;
    const cyc=[...new Set([0,1,2,3].map(i=>((endm-1+3*i)%12)+1))];
    for(const y of[Y-1,Y,Y+1])for(const m of cyc)ends.push([y,m]);
  }
  let best=null;
  for(const[y,m]of ends){const d=dueFor(y,m);if(d>=today&&(!best||d<best.due))best={due:d,pe:monthEnd(y,m)};}
  if(!best)return null;
  const f=d=>String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();
  return {due:f(best.due),periodEnd:f(best.pe)};
}
function clientVat(c){
  const r=c.c||{};
  if(r.vatStagger){const v=vatNextDue(r.vatStagger);if(v)return {due:v.due,periodEnd:v.periodEnd,stagger:r.vatStagger};}
  if(r.vatDue)return {due:r.vatDue,periodEnd:r.vatPeriodEnd||"",stagger:r.vatStagger||""};
  return null;
}

function nextDue(c){
  const cand=[];
  if(c.dl&&c.dl.status==="active"){
    if(c.dl.accountsDue)cand.push({t:"Accounts",s:dateLabel(c.dl.accountsDue),o:c.dl.accountsOverdue==="yes",days:daysTo(c.dl.accountsDue)});
    if(c.dl.csDue)cand.push({t:"CS",s:dateLabel(c.dl.csDue),o:c.dl.csOverdue==="yes",days:daysTo(c.dl.csDue)});
  }
  const vat=clientVat(c);
  if(vat)cand.push({t:"VAT",s:vat.due,o:false,days:daysTo(vat.due)});
  if(!cand.length)return null;
  cand.sort((a,b)=>(a.days??9e9)-(b.days??9e9));
  return cand[0];
}

function searchResults(){
  const q=Q.toLowerCase().trim();
  const qd=q.replace(/\D/g,"");
  const qToks=q.split(/[^a-z0-9@.'-]+/).filter(Boolean);
  // clients: rank exact-prefix name hits above substring hits above field hits;
  // ALL query tokens must appear somewhere in the client's searchable text
  function hay(c){const r=c.c||{};
    return (c.name+" "+(r.contact||"")+" "+(r.email||"")+" "+(r.vatNo||"")+" "+(r.utr||"")+" "+(r.address||"")+" "+(r.phone||"")+" "+(r.notes||"")).toLowerCase();}
  const scored=[];
  IDX.clients.forEach(c=>{
    const nm=c.name.toLowerCase(),hs=hay(c);
    let s=-1;
    if(nm.startsWith(q))s=0;
    else if(nm.includes(q))s=1;
    else if(qd&&qd.length>=4&&c.no.includes(qd))s=1;
    else if(qToks.length&&qToks.every(t=>hs.includes(t)))s=2;
    if(s>=0)scored.push([s,c]);
  });
  scored.sort((a,b)=>a[0]-b[0]||a[1].name.localeCompare(b[1].name));
  const cs=scored.map(x=>x[1]).slice(0,40);
  // people: every query token must prefix-match one of the person's name tokens
  // (order-insensitive, so "patel amit" finds "PATEL, Amitkumar")
  const ps=qToks.length?IDX.people.filter(p=>
    qToks.every(t=>p.tokens.some(tok=>tok.startsWith(t)))||p.person.toLowerCase().includes(q)
  ).slice(0,12):[];
  let h="";
  if(cs.length){h+='<div class="section"><h2>Clients</h2><span class="count2">'+scored.length+'</span></div><div class="card rowlist">'+cs.map(clientRow).join("")+"</div>";
    if(scored.length>40)h+=srcNote("Showing the first 40 — narrow the search.")}
  if(ps.length){h+='<div class="section"><h2>People</h2></div><div class="card rowlist">'+ps.map(p=>{
    const compNames=[...new Set([
      ...[...(p.codeClients||[])].map(k=>{const c=IDX.byKey.get(k);return c&&c.name}).filter(Boolean),
      ...p.ch.map(r=>{const c=IDX.byKey.get(normNo(r.companyNo));return c?c.name:("#"+r.companyNo)})
    ])];
    const tags=(p.entries.length?'<span class="pill gold">code</span>':"")+(p.ch.length?'<span class="pill">CH</span>':"");
    return '<div class="row" data-person="'+esc(p.key)+'"><div class="avatar">'+esc(initials(p.person))+'</div><div class="rmain"><div class="rname">'+esc(p.person)+'</div><div class="rsub">'+esc(compNames.slice(0,3).join(" · ")||"no companies linked")+'</div></div>'+tags+'<span class="chev">'+IC("chev-r")+'</span></div>';
  }).join("")+"</div>"}
  return h||'<div class="empty"><span class="big">'+IC("search-x")+'</span>No matches for “'+esc(Q)+'”</div>';
}

let CAL={y:null,m:null,sel:null};
function calendarHTML(items){
  const byDay={};
  items.forEach(i=>{if(parseDMY(i.due))(byDay[i.due]=byDay[i.due]||[]).push(i)});
  const y=CAL.y,m=CAL.m,first=new Date(y,m,1);
  const startDow=(first.getDay()+6)%7, dim=new Date(y,m+1,0).getDate();
  const now=new Date(), curMonth=now.getFullYear()===y&&now.getMonth()===m;
  const monthName=first.toLocaleDateString("en-GB",{month:"long",year:"numeric"});
  let cells="";
  for(let i=0;i<startDow;i++)cells+='<div class="cd off"></div>';
  for(let d=1;d<=dim;d++){
    const key=String(d).padStart(2,"0")+"/"+String(m+1).padStart(2,"0")+"/"+y;
    const its=byDay[key]||[];
    const kinds=[...new Set(its.map(i=>i.t))];
    const dots=kinds.slice(0,3).map(t=>'<span class="dot '+t+'"></span>').join("");
    cells+='<div class="cd'+(curMonth&&now.getDate()===d?" today":"")+(its.length?" has":"")+(CAL.sel===key?" sel":"")+'"'+
      (its.length?' data-day="'+key+'"':"")+'><span>'+d+'</span><div class="dots">'+dots+"</div>"+
      (its.length?'<span class="more2">'+its.length+"</span>":"")+"</div>";
  }
  return '<div class="card cal"><div class="calhead"><button class="iconbtn" data-cal="-1" aria-label="Previous month">'+IC("chev-l")+'</button><b>'+esc(monthName)+"</b>"+
    '<span style="display:flex;gap:6px">'+(curMonth?"":'<button class="btn sm" data-cal="0">Today</button>')+
    '<button class="iconbtn" data-cal="1" aria-label="Next month">'+IC("chev-r")+'</button></span></div>'+
    '<div class="calgrid caldow">'+["M","T","W","T","F","S","S"].map(x=>"<div>"+x+"</div>").join("")+"</div>"+
    '<div class="calgrid">'+cells+"</div>"+
    '<div class="callegend"><span><span class="dot acc"></span>Accounts</span><span><span class="dot cs"></span>Conf. stmt</span>'+
    '<span><span class="dot vat"></span>VAT</span></div></div>';
}
function renderDeadlines(v){
  const now=new Date();

  const items=deadlineItems().filter(i=>!isOverdue(i));   // calendar is forward-looking
  let day=[];
  if(CAL.sel){day=items.filter(i=>i.due===CAL.sel);if(!day.length)CAL.sel=null;}
  let h='<div class="pageintro"><div><span class="eyebrow">Compliance calendar</span><h2>Filing calendar</h2>'+
    '<p>Forward-looking Companies House and VAT deadlines, grouped by due date.</p></div></div>';

         (cl?'<span class="chev">'+IC("chev-r")+"</span>":"")+"</div>";
    });
    h+='</div><div class="dsec" style="padding-top:0">';
  }
  // 4) possibly the same person — labelled suggestions, never merged
  const maybes=IDX.people.map(q=>({q,why:possiblySame(p,q)})).filter(x=>x.why).slice(0,6);
  if(maybes.length){
    h+='<h3>Possibly the same person <span class="muted" style="text-transform:none;letter-spacing:0">· different spelling on the register — check before relying on it</span></h3>';

  }
  h+='<div class="section"><h2>This device</h2></div><div class="card" style="padding:14px 16px;font-size:14px">'+
    'Signed in as <b>'+esc(STATE.me)+'</b> <span class="badge '+(STATE.role==="admin"?"admin":"")+'">'+esc(STATE.role)+'</span>'+

  v.innerHTML=h;wire(v);
}

/* ---------- wiring ---------- */
function openClient(k){
  DETAIL={k};
  const rec=loadJ(RECENT_KEY,[]).filter(x=>x!==k);rec.unshift(k);saveJ(RECENT_KEY,rec.slice(0,6));
  window.scrollTo(0,0);paint();
}
function wire(v){
  v.querySelectorAll("[data-open]").forEach(el=>el.onclick=()=>openClient(el.dataset.open));
  v.querySelectorAll("[data-person]").forEach(el=>el.onclick=()=>{DETAIL={person:el.dataset.person};window.scrollTo(0,0);paint()});
  v.querySelectorAll("[data-nav]").forEach(el=>el.onclick=()=>{VIEWN=el.dataset.nav;DETAIL=null;if(el.dataset.f)DLFILTER=el.dataset.f;paint()});
  v.querySelectorAll("[data-owf]").forEach(el=>el.onclick=()=>{OWNERFILTER=el.dataset.owf;paint()});
  v.querySelectorAll("[data-dlf]").forEach(el=>el.onclick=()=>{DLFILTER=el.dataset.dlf;CAL.sel=null;paint()});
  v.querySelectorAll("[data-dlnav]").forEach(el=>el.onclick=()=>{DLFILTER=el.dataset.dlnav;CAL.sel=null;VIEWN="deadlines";DETAIL=null;window.scrollTo(0,0);paint()});
  v.querySelectorAll("[data-cal]").forEach(el=>el.onclick=()=>{
    const d=+el.dataset.cal;CAL.sel=null;
    if(d===0){const n=new Date();CAL.y=n.getFullYear();CAL.m=n.getMonth()}
    else{CAL.m+=d;if(CAL.m<0){CAL.m=11;CAL.y--}if(CAL.m>11){CAL.m=0;CAL.y++}}
    paint();
  });
  v.querySelectorAll("[data-day]").forEach(el=>el.onclick=()=>{CAL.sel=CAL.sel===el.dataset.day?null:el.dataset.day;paint()});
  v.querySelectorAll("[data-calclear]").forEach(el=>el.onclick=()=>{CAL.sel=null;paint()});
  // keyboard access: the drill-down rows/days are click-only DIVs — make them focusable buttons
  v.querySelectorAll("[data-open],[data-person],[data-day]").forEach(el=>{
    if(el.tagName==="DIV"){el.tabIndex=0;el.setAttribute("role","button");
      el.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();el.click()}});}
  });
  v.querySelectorAll("[data-copy]").forEach(b=>b.onclick=e=>{e.stopPropagation();copyTxt(b.dataset.copy)});
  const back=v.querySelector("#back");if(back)back.onclick=()=>{DETAIL=null;paint()};
  v.querySelectorAll("[data-acc]").forEach(a=>{a.querySelector("button").onclick=()=>a.classList.toggle("open")});
  v.querySelectorAll("[data-rev]").forEach(b=>b.onclick=async e=>{
    e.stopPropagation();
    b.textContent="…";b.disabled=true;
    try{
      const q=JSON.parse(b.dataset.rev);
      const j=await api("reveal",q);
      const cell=b.closest(".fact").querySelector(".fv");
      cell.innerHTML='<span class="revealed">'+esc(j.value)+"</span>";
      const cp=document.createElement("button");cp.className="copy";cp.setAttribute("aria-label","Copy");cp.innerHTML=IC("copy");cp.onclick=()=>copyTxt(j.value);
      b.replaceWith(cp);
      setTimeout(()=>{if(!cell.isConnected)return;cell.textContent="•••••";b.innerHTML=RVL;b.disabled=false;cp.replaceWith(b);toast("Hidden again");
        if(STALEVIEW&&!document.querySelector("#view .revealed"))paint()},45000);   // deferred background refresh
    }catch(err){b.innerHTML=RVL;b.disabled=false;toast(err.message||"Failed")}
  });
  v.querySelectorAll("[data-misc]").forEach(b=>b.onclick=async()=>{
    b.textContent="…";b.disabled=true;
    try{
      const j=await api("revealMisc",{tab:b.dataset.misc});
      const div=document.createElement("div");div.className="accbody";div.style.display="block";div.style.padding="0 16px 14px";
      div.innerHTML='<table class="misc">'+j.rows.map(r=>"<tr>"+r.map(c=>"<td>"+esc(c)+"</td>").join("")+"</tr>").join("")+"</table>";
      b.closest(".locked").after(div);b.remove();
    }catch(err){b.textContent="Open";b.disabled=false;toast(err.message||"Failed")}
  });
  v.querySelectorAll("[data-chrefresh]").forEach(b=>b.onclick=async()=>{
    const no=b.dataset.chrefresh;
    b.disabled=true;b.textContent="Checking Companies House…";
    try{
      const j=await api("chRefreshOne",{companyNo:no});
      const d=STATE.data.Deadlines||[];
      const i=d.findIndex(r=>normNo(r.companyNo)===normNo(no));
      if(j.deadlines){ if(i>=0)d[i]=j.deadlines; else d.push(j.deadlines); STATE.data.Deadlines=d; }
      STATE.data.People=(STATE.data.People||[]).filter(p=>normNo(p.companyNo)!==normNo(no)).concat(j.people||[]);
      LASTSTR=null;                      // state diverged from the cached bulk — force next refresh to repaint
      buildIndex();paint();toast("Fresh from Companies House");
    }catch(e){ b.disabled=false;b.innerHTML=IC("refresh")+"Refresh from CH";toast(e.message||"CH refresh failed"); }
  });
  v.querySelectorAll("[data-sweep]").forEach(b=>b.onclick=async()=>{
    b.disabled=true;b.textContent="Queuing…";
    try{ const j=await api("chSweepStart",{});toast("Full CH sweep queued — the cloud runs it over the next ~2 hours");
         b.textContent="Sweep queued ✓"; }
    catch(e){ b.disabled=false;b.textContent="Refresh ALL from CH";toast(e.message||"Failed") }
  });
  v.querySelectorAll("[data-wf]").forEach(b=>b.onclick=()=>{const c=IDX.byKey.get(b.dataset.wf);if(c)openWorkflow(c)});
  v.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{const c=IDX.byKey.get(b.dataset.edit);if(c)openEditDetails(c)});
  v.querySelectorAll("[data-addcode]").forEach(b=>b.onclick=()=>{const c=IDX.byKey.get(b.dataset.addcode);openAddCode(c?c.name:"")});
  v.querySelectorAll("[data-addlogin]").forEach(b=>b.onclick=()=>{const c=IDX.byKey.get(b.dataset.addlogin);openAddLogin(c?c.name:"")});
  v.querySelectorAll("[data-restore]").forEach(b=>b.onclick=()=>{if(confirm("Restore this row from Trash?"))doWrite("restore",{id:b.dataset.restore},"Restored")});
  const rl=v.querySelector("#reloadBtn");if(rl)rl.onclick=()=>connect(true);
  const rc=v.querySelector("#reconnBtn");if(rc)rc.onclick=()=>showConnect();
}

let ADMINMODE=false;

function showConnect(msg,teamNames){
  $("#mUrl").value=CFG.url||DEFAULT_API_URL;

    $("#teamlist").innerHTML=teamNames.map(n=>'<option value="'+esc(n)+'"></option>').join("");

}
function closeConnect(){$("#scrim").classList.remove("on")}
$("#mCancel").onclick=closeConnect;

$("#mToggle").onclick=()=>setAdmin(!ADMINMODE);
$("#mConnect").onclick=()=>{
  const raw=$("#mUrl").value.trim();
  if(raw&&!safeUrl(raw)){toast("That web app URL isn't a script.google.com address");return}
  const url=safeUrl(raw)||DEFAULT_API_URL;
  let code,who;
  if(ADMINMODE){ code=$("#mCode").value.trim(); who=""; if(!code){toast("Access code needed");return} }
  else{ code=$("#mPass").value.trim(); who=$("#mName").value.trim();
        if(!code){toast("Team password needed");return}
        if(!who){toast("Enter your name");return} }
  if(code!==CFG.code||url!==CFG.url){clearCache();STATE=null;IDX=null;DETAIL=null;LASTSTR=null}
  CFG.code=code;CFG.url=url;CFG.who=who;
  saveJ(CFG_KEY,CFG);connect(true);
};

function canAddTab(tab){ if(!STATE)return false; if(STATE.role==="admin")return true;
  const w=(STATE.write||{})[STATE.role]||{}; return !!(w[tab]&&w[tab].add); }
function canEditField(tab,field){ if(!STATE)return false; if(STATE.role==="admin")return true;
  const t=((STATE.write||{})[STATE.role]||{})[tab]; return !!(t&&t.editFields&&t.editFields.includes(field)); }
function canEditTab(tab){ if(!STATE)return false; if(STATE.role==="admin")return true;
  const t=((STATE.write||{})[STATE.role]||{})[tab]; return !!(t&&t.editFields&&t.editFields.length); }

// Every write refreshes from the backend so the new/edited row (and rev) appear.
async function doWrite(op,payload,okMsg){

  catch(err){ toast(err.message||"Couldn't save"); throw err; }
}

function collectWizard(){
  const d=WIZ.data;
  ["contact","phone","email","utr","vatNo","services","notes","authCode","ggId","ggPassword","address"].forEach(f=>{const el=$("#wf_"+f);if(el)d[f]=el.value.trim()});
  const cel=$("#wf_company"); if(cel)d.company=cel.value.trim();
}
function wireWizard(){
  const c=$("#wzCancel"); if(c)c.onclick=closeModal2;
  const b=$("#wzBack"); if(b)b.onclick=()=>{collectWizard();WIZ.step--;renderWizard()};
  const sk=$("#wzSkip"); if(sk)sk.onclick=()=>{WIZ.data={};WIZ.officers=[];WIZ.step=2;renderWizard()};
  const s=$("#wzSearch"); if(s)s.onclick=doWizSearch;
  const n=$("#wzNext"); if(n)n.onclick=()=>{collectWizard();if(!WIZ.data.company){toast("Company name needed");return}WIZ.step=3;renderWizard()};
  const sv=$("#wzSave"); if(sv)sv.onclick=doWizSave;
  const q=$("#wzq"); if(q)q.onkeydown=e=>{if(e.key==="Enter"){e.preventDefault();doWizSearch()}};
}
async function doWizSearch(){
  const q=$("#wzq").value.trim(); WIZ.data._q=q;
  if(!q){toast("Type a name or number");return}
  const res=$("#wzres"); res.innerHTML='<p class="muted">Searching Companies House…</p>';
  try{
    const j=await api("chLookup",{q});
    if(j.profile){ applyProfile(j.profile,j.officers); return; }
    const items=j.candidates||[];
    if(!items.length){ res.innerHTML='<p class="muted">No matches. Check the spelling, or Skip to enter manually.</p>'; return; }
    res.innerHTML='<div style="margin-top:8px">'+items.map((it,i)=>'<div class="pickrow" data-pick="'+i+'"><div class="pmain"><div class="pn">'+esc(it.company)+'</div><div class="ps">#'+esc(it.companyNo)+' · '+esc(it.status)+(it.address?" · "+esc(it.address):"")+'</div></div>'+IC("chev-r")+'</div>').join("")+'</div>';
    res.querySelectorAll("[data-pick]").forEach(el=>el.onclick=async()=>{
      const it=items[+el.dataset.pick]; res.innerHTML='<p class="muted">Fetching '+esc(it.company)+'…</p>';
      try{ const j2=await api("chLookup",{q:it.companyNo}); applyProfile(j2.profile,j2.officers); }
      catch(e){ res.innerHTML='<p class="muted">'+esc(e.message||"lookup failed")+'</p>'; }
    });
  }catch(e){ res.innerHTML='<p class="muted">'+esc(e.message||"lookup failed")+' — you can Skip and type it in.</p>'; }
}
function applyProfile(p,officers){
  if(!p)return;
  WIZ.data=Object.assign({},WIZ.data,{company:p.company,companyNo:p.companyNo,status:p.status,incDate:p.incDate,address:p.address});
  WIZ.officers=(officers||[]).map(o=>({name:o.name,role:o.role,dob:o.dob}));
  WIZ.step=2; renderWizard();
}
function doWizSave(){
  collectWizard();
  const d=WIZ.data, fields={};
  ["company","companyNo","contact","incDate","utr","vatNo","address","email","phone","authCode","ggId","ggPassword","notes","services"].forEach(f=>{if(d[f])fields[f]=d[f]});

  doWrite("add",{tab:"Companies",fields:fields,officers:WIZ.officers},"Client added — it will appear on the master sheet shortly");
}

    [["authCode","CH auth code"],["ggId","Gov Gateway ID"],["ggPassword","GG password"],["ni","NI number"],["dob","Date of birth"]].forEach(([k,l])=>{
      h+='<div class="field"><label>'+esc(l)+'</label><input id="ed_'+k+'" placeholder="'+(r[k]==="•••"?"set — type to replace":"not set")+'"></div>'; });
  }
  h+=modalButtons("edSave","Save changes",STATE.role==="admin"?'<button class="btn" id="edDel" style="color:var(--red);border-color:var(--redbg)">'+IC("trash")+'Delete</button>':"");
  openModal2(h);
  $("#m2Cancel").onclick=closeModal2;
  const del=$("#edDel"); if(del)del.onclick=()=>{ if(!r.id){toast("Unavailable until migration");return}
    if(confirm("Move "+c.name+" to Trash? An admin can restore it.")) doWrite("remove",{tab:"Companies",id:r.id},"Moved to Trash"); };
  $("#edSave").onclick=()=>{
    if(!r.id){toast("Saving is unavailable until the sheet is migrated");return}
    const fields={};
    F.forEach(([k])=>{const el=$("#ed_"+k);if(el&&!el.disabled){const val=el.value.trim();if(val!==String(r[k]||""))fields[k]=val;}});
    if(STATE.role==="admin")["authCode","ggId","ggPassword","ni","dob"].forEach(k=>{const el=$("#ed_"+k);if(el&&el.value.trim())fields[k]=el.value.trim();});
    if(!Object.keys(fields).length){toast("No changes");return}
    doWrite("update",{tab:"Companies",id:r.id,fields:fields,baseUpdatedAt:r.updatedAt||""},"Saved");
  };
}

/* ----- workflow: status / owner / follow-up (writes back to the master sheet) ----- */
function canAcctEdit(){ if(!STATE)return false; if(STATE.role==="admin")return true;
  const t=((STATE.write||{})[STATE.role]||{}).Accounts; return !!(t&&t.edit); }
function openWorkflow(c){
  const acct=IDX.master.get(normName(c.name));
  if(!acct){toast("Not on the master sheet");return}
  const p=parseStatus(acct.acctStatus);
  let h='<h2>'+esc(acct.company)+'</h2><p>Status and owner sync to the master sheet within ~10 minutes. Every change is logged.</p>';
  h+='<div class="field"><label>Stage</label><div class="stagegrid" id="wfStages">'+
     STAGES.map(([s])=>'<button type="button" data-st="'+esc(s)+'"'+(p.stage===s?' class="on"':"")+'>'+esc(s)+'</button>').join("")+
     '</div></div>';
  h+='<div class="field"><label>Detail <span class="muted">· dates, routing instructions, one-off notes — kept verbatim</span></label>'+
     '<input id="wfDetail" value="'+esc(p.detail)+'"><div class="hint" id="wfHint"></div></div>';
  h+='<div class="field"><label>Owner</label><div class="ownerrow" id="wfOwner">'+
     OWNERS.map(o=>'<button type="button" data-ow="'+esc(o)+'"'+(acct.owner===o?' class="on"':"")+'>'+esc(o)+'</button>').join("")+
     '<button type="button" data-ow=""'+(!acct.owner?' class="on"':"")+'>Unassigned</button></div></div>';
  h+='<div class="field"><label>Follow-up note</label><textarea id="wfFollow">'+esc(acct.followUp||"")+'</textarea></div>';
  h+=modalButtons("wfSave","Save");
  openModal2(h);
  let stage=p.stage, owner=acct.owner||"";
  const hint=()=>{ $("#wfHint").textContent=CHASE_STAGES.has(stage)&&!/\d{2}\/\d{2}\/\d{4}/.test($("#wfDetail").value)
      ?("Today's date ("+todayDMY()+") will be added automatically"):""; };
  $("#wfStages").querySelectorAll("[data-st]").forEach(b=>b.onclick=()=>{
    stage=b.dataset.st;$("#wfStages").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));hint();});
  $("#wfDetail").oninput=hint; hint();
  $("#wfOwner").querySelectorAll("[data-ow]").forEach(b=>b.onclick=()=>{
    owner=b.dataset.ow;$("#wfOwner").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));});
  $("#m2Cancel").onclick=closeModal2;
  $("#wfSave").onclick=async()=>{
    let detail=$("#wfDetail").value.trim();
    if(CHASE_STAGES.has(stage)&&!/\d{2}\/\d{2}\/\d{4}/.test(detail))detail=(detail?detail+" ":"")+todayDMY();
    const sep=(stage===p.stage&&p.sep)?p.sep:" ";
    const status=stage==="Other"?detail:(stage+(detail?sep+detail:""));
    const fields={};
    if(status!==String(acct.acctStatus||""))fields.status=status;
    if(owner!==String(acct.owner||""))fields.owner=owner;
    const fu=$("#wfFollow").value.trim();
    if(fu!==String(acct.followUp||""))fields.followUp=fu;
    if(!Object.keys(fields).length){toast("No changes");return}
    $("#wfSave").disabled=true;$("#wfSave").textContent="Saving…";
    try{
      await api("updateAccounts",{company:acct.company,fields});
      // optimistic: patch the mirror row in place so every view updates instantly
      if(fields.status!=null)acct.acctStatus=fields.status;
      if(fields.owner!=null)acct.owner=fields.owner;
      if(fields.followUp!=null)acct.followUp=fields.followUp;
      LASTSTR=null; closeModal2(); paint();
      toast("Saved — master sheet updates within ~10 min");
    }catch(e){ $("#wfSave").disabled=false;$("#wfSave").textContent="Save";toast(e.message||"Couldn't save"); }
  };
}

/* ----- changes feed helpers (admin) ----- */
function chgRow(c){
  return '<div class="chgrow"><div class="ct">'+esc(dateTimeLabel(c.when))+'</div>'+
    '<div class="cop '+esc(c.op)+'">'+esc(c.op)+'</div>'+
    '<div style="flex:1;min-width:0"><div>'+esc(c.entity||c.tab)+(c.field?' · <span class="muted">'+esc(c.field)+'</span>':"")+'</div>'+
    (c.newValue&&c.newValue!=="(created)"&&c.newValue!=="•••"?'<div class="muted" style="font-size:11px">'+esc(c.oldValue||"—")+' → '+esc(c.newValue)+'</div>':"")+'</div>'+
    '<div class="ct" style="width:auto;text-align:right">'+esc(c.who||"")+'</div></div>';
}
function trashName(t){ try{const o=JSON.parse(t.json);return o.company||o.person||o.entity||o.employer||t.id;}catch(e){return t.id;} }

/* ---------- boot ---------- */
(function boot(){
  document.documentElement.setAttribute("data-theme","light");
  localStorage.removeItem("mapvault.theme");
  const p=new URLSearchParams(location.search);
  if(p.get("k")){
    const nurl=safeUrl(p.get("u"))||DEFAULT_API_URL;   // ignore any non-Google ?u= origin
    if(p.get("k")!==CFG.code||nurl!==CFG.url)clearCache();
    CFG.code=p.get("k");CFG.url=nurl;saveJ(CFG_KEY,CFG);history.replaceState({},"",location.pathname)
  }
  if(p.has("demo")){startDemo();return}
  if(!CFG.code){showConnect();return}
  const c=loadCache();
  if(c){                       // instant open from this device's last load, refresh behind it
    STATE=c.state;LASTSTR=c.str;buildIndex();
    $("#who").textContent=STATE.me;setConn("sync");paint();
  }
  connect(false);
})();
</script>

<title>MAP Vault</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1c5bd8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗝️</text></svg>">
<style>
:root{
  --bg:#f2f4f8; --card:#ffffff; --ink:#111726; --mut:#61708b; --line:#e2e7f0;
  --accent:#1c5bd8; --accent-soft:#e8effc; --accent-ink:#fff;
  --chip:#eef1f7; --red:#d92d20; --redbg:#fee4e2; --amber:#b54708; --amberbg:#fef0c7;
  --green:#067647; --greenbg:#dcfae6; --gold:#8a6d00; --goldbg:#fff4c6;
  --shadow:0 1px 2px rgba(16,24,40,.05),0 6px 18px rgba(16,24,40,.06);
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --navh:64px;
}
@media (prefers-color-scheme:dark){:root{
  --bg:#0d1117; --card:#161c26; --ink:#e8edf5; --mut:#95a1b6; --line:#232c3b;
  --accent:#3b82f6; --accent-soft:#16233c; --chip:#1d2635;
  --red:#ff6b5e; --redbg:#3a1512; --amber:#ffc164; --amberbg:#3a2a0e;
  --green:#4cc57e; --greenbg:#0f2b1c; --gold:#e8c65a; --goldbg:#2f2810;
  --shadow:0 1px 2px rgba(0,0,0,.35),0 8px 22px rgba(0,0,0,.35);
}}
:root[data-theme="light"]{--bg:#f2f4f8;--card:#fff;--ink:#111726;--mut:#61708b;--line:#e2e7f0;--accent:#1c5bd8;--accent-soft:#e8effc;--chip:#eef1f7;--red:#d92d20;--redbg:#fee4e2;--amber:#b54708;--amberbg:#fef0c7;--green:#067647;--greenbg:#dcfae6;--gold:#8a6d00;--goldbg:#fff4c6;--shadow:0 1px 2px rgba(16,24,40,.05),0 6px 18px rgba(16,24,40,.06)}
:root[data-theme="dark"]{--bg:#0d1117;--card:#161c26;--ink:#e8edf5;--mut:#95a1b6;--line:#232c3b;--accent:#3b82f6;--accent-soft:#16233c;--chip:#1d2635;--red:#ff6b5e;--redbg:#3a1512;--amber:#ffc164;--amberbg:#3a2a0e;--green:#4cc57e;--greenbg:#0f2b1c;--gold:#e8c65a;--goldbg:#2f2810;--shadow:0 1px 2px rgba(0,0,0,.35),0 8px 22px rgba(0,0,0,.35)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.45;
  padding-bottom:calc(var(--navh) + env(safe-area-inset-bottom));}
button{font:inherit;color:inherit;cursor:pointer}
input{font:inherit;color:var(--ink)}
a{color:var(--accent);text-decoration:none}

/* ---------- header ---------- */
header{position:sticky;top:0;z-index:30;background:var(--card);border-bottom:1px solid var(--line);
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;display:flex;align-items:center;gap:10px}
.logo{font-size:22px}
h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.2px}
.grow{flex:1}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--chip);color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
.badge.admin{background:var(--accent);color:var(--accent-ink)}
.iconbtn{border:1px solid var(--line);background:var(--card);border-radius:10px;width:38px;height:38px;font-size:16px;flex:0 0 auto}

/* ---------- search ---------- */
.searchwrap{position:sticky;top:calc(59px + env(safe-area-inset-top));z-index:25;background:var(--bg);padding:12px 16px 8px;max-width:760px;margin:0 auto}
.searchbox{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow)}
.searchbox:focus-within{border-color:var(--accent)}
.searchbox input{flex:1;border:none;outline:none;background:none;font-size:16px;min-width:0}
.searchbox .clear{border:none;background:var(--chip);border-radius:50%;width:26px;height:26px;font-size:13px;color:var(--mut);display:none}

/* ---------- layout ---------- */
.wrap{max-width:760px;margin:0 auto;padding:8px 16px 40px}
.section{margin:18px 0 8px;display:flex;align-items:baseline;gap:8px}
.section h2{font-size:14px;margin:0;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.section .more{margin-left:auto;font-size:13.5px;font-weight:600;background:none;border:none;color:var(--accent)}

/* ---------- cards & rows ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
.rowlist .row{display:flex;align-items:center;gap:12px;padding:13px 15px;border-bottom:1px solid var(--line);cursor:pointer}
.rowlist .row:last-child{border-bottom:none}
.rowlist .row:active{background:var(--chip)}
.row .avatar{width:40px;height:40px;border-radius:12px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex:0 0 auto}
.row .avatar.cs{background:var(--amberbg);color:var(--amber)} .row .avatar.vat{background:var(--greenbg);color:var(--green)}
.count2{margin-left:auto;font-size:13px;color:var(--mut);font-weight:700}
.row .rmain{flex:1;min-width:0}
.row .rname{font-weight:650;font-size:15.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .rsub{font-size:12.5px;color:var(--mut);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .chev{color:var(--mut);font-size:18px;flex:0 0 auto}
.pill{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--chip);color:var(--mut);white-space:nowrap;flex:0 0 auto}
.pill.red{background:var(--redbg);color:var(--red)}
.pill.amber{background:var(--amberbg);color:var(--amber)}
.pill.green{background:var(--greenbg);color:var(--green)}
.pill.gold{background:var(--goldbg);color:var(--gold)}

/* stat tiles */
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center;cursor:pointer;box-shadow:var(--shadow)}
.tile b{display:block;font-size:22px}
.tile span{font-size:12px;color:var(--mut);font-weight:600}
.tile.warn b{color:var(--red)}

/* ---------- dossier ---------- */
.dhead{padding:18px 16px 14px;border-bottom:1px solid var(--line)}
.dhead h2{margin:0 0 4px;font-size:20px;line-height:1.25}
.dhead .meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:13px;color:var(--mut)}
.mono{font-family:var(--mono)}
.dsec{padding:6px 16px 14px}
.dsec h3{font-size:13px;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;margin:14px 0 6px;font-weight:700}
.fact{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line)}
.fact:last-child{border-bottom:none}
.fact .fl{width:118px;flex:0 0 auto;font-size:12.5px;color:var(--mut);font-weight:600}
.fact .fv{flex:1;min-width:0;font-family:var(--mono);font-size:14.5px;word-break:break-word}
.fact .fv.plain{font-family:var(--sans)}
.fact .copy{border:none;background:var(--chip);border-radius:8px;padding:6px 10px;font-size:13px;color:var(--mut);flex:0 0 auto}
.fact .copy:active{background:var(--accent-soft);color:var(--accent)}
.reveal{border:1px solid var(--line);background:var(--goldbg);color:var(--gold);border-radius:9px;padding:6px 12px;font-size:13px;font-weight:700;flex:0 0 auto}
.lockchip{font-size:12px;color:var(--mut);background:var(--chip);border-radius:8px;padding:5px 10px;flex:0 0 auto}
.revealed{background:var(--goldbg);color:var(--gold);border-radius:6px;padding:2px 7px}
.dueband{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px 4px}
.duecard{border:1px solid var(--line);border-radius:13px;padding:11px 13px}
.duecard .dl{font-size:12px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.duecard .dv{font-size:17px;font-weight:750;margin-top:3px}
.duecard .dn{font-size:12px;color:var(--mut);margin-top:2px}
.duecard.red{background:var(--redbg);border-color:transparent} .duecard.red .dv,.duecard.red .dl{color:var(--red)}
.duecard.amber{background:var(--amberbg);border-color:transparent} .duecard.amber .dv,.duecard.amber .dl{color:var(--amber)}
.srcnote{padding:2px 16px 14px;font-size:11.5px;color:var(--mut)}
.backbtn{border:none;background:none;color:var(--accent);font-weight:650;font-size:15px;padding:14px 16px 0;display:flex;align-items:center;gap:6px}

/* ---------- bottom nav ---------- */
nav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--card);border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:6px 8px calc(6px + env(safe-area-inset-bottom))}
nav button{flex:1;max-width:120px;border:none;background:none;color:var(--mut);font-size:11px;font-weight:650;
  display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;border-radius:12px}
nav button .ni{font-size:21px;line-height:1.15}
nav button.on{color:var(--accent)}
nav button.on .ni{transform:scale(1.06)}

/* ---------- filters ---------- */
.filters{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.fbtn{border:1px solid var(--line);background:var(--card);color:var(--mut);border-radius:20px;padding:7px 14px;font-size:13.5px;font-weight:650;white-space:nowrap}
.fbtn.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}

/* ---------- calendar ---------- */
.cal{padding:12px 12px 10px;margin-bottom:12px}
.calhead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.calhead b{font-size:15.5px}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.caldow div{text-align:center;font-size:11px;color:var(--mut);font-weight:700;padding:2px 0}
.cd{height:48px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:13px;position:relative;border:1px solid transparent}
.cd.off{visibility:hidden}
.cd.has{background:var(--chip);cursor:pointer;font-weight:650}
.cd.has:active{filter:brightness(.95)}
.cd.today{border-color:var(--accent)}
.cd.sel{background:var(--accent);color:var(--accent-ink)}
.dots{display:flex;gap:2.5px;height:5px}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block;flex:0 0 auto}
.dot.acc{background:var(--accent)} .dot.cs{background:var(--amber)} .dot.vat{background:var(--green)} .dot.od{background:var(--red)}
.cd.sel .dot{background:var(--accent-ink)}
.more2{position:absolute;top:2px;right:4px;font-size:9px;color:var(--mut)}
.cd.sel .more2{color:var(--accent-ink)}
.callegend{display:flex;gap:14px;justify-content:center;margin-top:9px;font-size:11.5px;color:var(--mut);flex-wrap:wrap}
.callegend .dot{margin-right:4px}
.selday{display:flex;align-items:center;gap:8px;margin:2px 0 8px;font-size:13.5px;color:var(--mut);font-weight:650}
.selday button{border:none;background:var(--chip);border-radius:50%;width:22px;height:22px;font-size:11px;color:var(--mut)}

/* ---------- misc tables ---------- */
.acc{border-bottom:1px solid var(--line)}
.acc:last-child{border-bottom:none}
.acc>button{width:100%;border:none;background:none;text-align:left;padding:14px 16px;font-size:15px;font-weight:650;display:flex;align-items:center;gap:10px}
.acc .chev{margin-left:auto;color:var(--mut);transition:transform .15s}
.acc.open .chev{transform:rotate(90deg)}
.accbody{display:none;padding:0 16px 14px;overflow-x:auto}
.acc.open .accbody{display:block}
table.misc{width:100%;border-collapse:collapse;font-size:13px}
table.misc td{border:1px solid var(--line);padding:6px 9px;vertical-align:top;font-family:var(--mono)}
.locked{border:1px dashed var(--gold);border-radius:12px;padding:12px 14px;color:var(--gold);background:var(--goldbg);font-size:14px;display:flex;justify-content:space-between;align-items:center;gap:10px;margin:0 16px 12px}

/* ---------- modal / toast / empty ---------- */
.scrim{position:fixed;inset:0;background:rgba(9,12,18,.55);display:none;align-items:flex-end;justify-content:center;z-index:60;padding:0}
.scrim.on{display:flex}
@media(min-width:640px){.scrim{align-items:center;padding:16px}}
.modal{background:var(--card);border:1px solid var(--line);border-radius:20px 20px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));max-width:460px;width:100%;box-shadow:var(--shadow)}
@media(min-width:640px){.modal{border-radius:20px;padding-bottom:22px}}
.modal h2{margin:0 0 6px;font-size:18px}
.modal p{color:var(--mut);font-size:13.5px;margin:0 0 16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:650;color:var(--mut);margin-bottom:5px}
.field input{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px;background:var(--bg);outline:none;font-size:16px}
.field input:focus{border-color:var(--accent)}
.btn{font-weight:650;border:1px solid var(--line);background:var(--card);border-radius:11px;padding:11px 16px}
.btn.primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
.toast{position:fixed;bottom:calc(var(--navh) + 14px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:12px;font-size:14px;z-index:80;opacity:0;transition:opacity .2s;pointer-events:none;max-width:88vw;text-align:center}
.toast.on{opacity:1}
.empty{text-align:center;color:var(--mut);padding:48px 20px;font-size:15px}
.empty .big{font-size:34px;display:block;margin-bottom:8px}
.skel{height:110px;border-radius:16px;background:linear-gradient(100deg,var(--chip) 40%,var(--card) 50%,var(--chip) 60%);background-size:200% 100%;animation:sh 1.2s infinite}
@keyframes sh{to{background-position:-200% 0}}
.conn{width:9px;height:9px;border-radius:50%;background:var(--mut);flex:0 0 auto}
.conn.ok{background:var(--green)} .conn.err{background:var(--red)}
.gletter{position:sticky;top:calc(130px + env(safe-area-inset-top));font-size:12px;font-weight:800;color:var(--mut);padding:10px 4px 4px;background:var(--bg);z-index:5}
</style>

<header>
  <span class="logo">🗝️</span><h1>MAP Vault</h1>
  <span class="grow"></span>
  <span id="who" style="font-size:13px;color:var(--mut)"></span>
  <span class="conn" id="conn"></span>
  <button class="iconbtn" id="themeBtn" title="Light/dark">◐</button>
</header>

<div class="searchwrap" id="searchwrap">
  <div class="searchbox">🔍<input id="q" placeholder="Search a client, person or number…" autocomplete="off">
  <button class="clear" id="qclear">✕</button></div>
</div>

<div class="wrap" id="view"></div>

<nav id="nav">
  <button data-v="home"><span class="ni">🏠</span>Home</button>
  <button data-v="clients"><span class="ni">👥</span>Clients</button>
  <button data-v="deadlines"><span class="ni">📅</span>Calendar</button>
  <button data-v="more"><span class="ni">⚙️</span>More</button>
</nav>

<div class="scrim" id="scrim">
  <div class="modal">
    <h2>Connect to the vault</h2>
    <p id="mMsg">Paste your personal access code (from your invite link). It stays on this device only.</p>
    <div class="field"><label>Your access code</label><input id="mCode" placeholder="access code" autocomplete="off"></div>
    <details style="margin-bottom:14px"><summary style="font-size:13px;color:var(--mut)">Advanced: web app URL</summary>
      <div class="field" style="margin-top:8px"><label>Web app URL</label><input id="mUrl" placeholder="https://script.google.com/macros/s/…/exec"></div>
    </details>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" id="mCancel">Cancel</button>
      <button class="btn primary" id="mConnect">Connect</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const DEFAULT_API_URL = "https://script.google.com/macros/s/AKfycbyopmm6e_aymCbnz3phNKU9Ag-9vaXf0nQVjnn3ukOukLqSJj6oPNy5veC2KuPKuuew/exec";
const CFG_KEY="mapvault.cfg", THEME_KEY="mapvault.theme", RECENT_KEY="mapvault.recent";
let CFG=loadJ(CFG_KEY,{}), STATE=null, IDX=null, VIEWN="home", DETAIL=null, Q="", DLFILTER="soon";

/* ---------- utils ---------- */
function $(s){return document.querySelector(s)}
function loadJ(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}}
function saveJ(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("on");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("on"),1900)}
function setConn(s){$("#conn").className="conn"+(s?" "+s:"")}
function copyTxt(v){navigator.clipboard.writeText(v).then(()=>toast("Copied"),()=>toast("Copy failed"))}
function normNo(n){const s=String(n||"").replace(/\D/g,"");return s.replace(/^0+/,"")}
function normName(s){return String(s||"").toLowerCase().replace(/\b(ltd|limited|llp|plc|the)\b/g," ").replace(/[^a-z0-9]+/g," ").trim()}
function initials(s){const w=String(s||"?").split(/\s+/).filter(Boolean);return ((w[0]||"?")[0]+(w[1]?w[1][0]:"")).toUpperCase()}
function parseDMY(s){if(!s)return null;const p=String(s).split("/");if(p.length!==3)return null;const d=new Date(+p[2],+p[1]-1,+p[0]);return isNaN(d)?null:d}
function daysTo(s){const d=parseDMY(s);if(!d)return null;const t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000)}
function dueClass(days,overdue){if(overdue||days!=null&&days<0)return"red";if(days!=null&&days<=14)return"red";if(days!=null&&days<=31)return"amber";return""}
function dueNote(days,overdue){if(overdue)return"OVERDUE";if(days==null)return"";if(days<0)return Math.abs(days)+"d overdue";if(days===0)return"today";if(days===1)return"tomorrow";if(days<=60)return"in "+days+" days";return""}

/* ---------- api ---------- */
async function api(op,payload){
  const u=new URL(CFG.url||DEFAULT_API_URL);
  u.searchParams.set("k",CFG.code);
  if(op)u.searchParams.set("op",op);
  if(payload)u.searchParams.set("payload",JSON.stringify(payload));
  u.searchParams.set("_",Date.now());   // bust any cached GET so data is always fresh
  const r=await fetch(u.toString(),{cache:"no-store"});
  const j=await r.json();
  if(!j.ok)throw new Error(j.error||"error");
  return j;
}
async function connect(announce){
  try{
    setConn();
    renderSkeleton();
    const j=await api("",null);
    STATE=j.state;buildIndex();saveJ(CFG_KEY,CFG);
    closeConnect();setConn("ok");
    $("#who").textContent=STATE.me;
    paint();
    if(announce)toast("Hi "+STATE.me+" — connected"+(STATE.role==="admin"?" as admin":""));
  }catch(e){
    setConn("err");
    $("#view").innerHTML='<div class="empty"><span class="big">🔌</span>Not connected</div>';
    showConnect("Could not connect: "+(e.message||e)+". Check your access code.");
  }
}

/* ---------- index: join everything by client ---------- */
function buildIndex(){
  const d=STATE.data, clients=new Map(), people=new Map();
  const keyFor=(no,name)=>normNo(no)||("n:"+normName(name));
  function client(no,name){
    const k=keyFor(no,name);
    if(!clients.has(k))clients.set(k,{k,name:name||"",no:normNo(no)?String(no):"",c:null,dl:null,logins:[],codes:[],pension:[]});
    const c=clients.get(k);
    if(name&&(!c.name||/LIMITED|LTD/i.test(name)===false&&c.name.length<name.length===false))c.name=c.name||name;
    return c;
  }
  (d.Companies||[]).forEach(r=>{const c=client(r.companyNo,r.company||r.contact);c.c=r;if(r.company)c.name=r.company});
  (d.Deadlines||[]).forEach(r=>{const c=client(r.companyNo,r.company);c.dl=r;if(!c.name)c.name=r.company});
  // normName strips ltd/llp/plc, so two entities differing only by suffix share a key.
  // Attach related rows to ALL clients sharing the key (never silently to the wrong one)
  // and warn, rather than first-wins misattribution.
  const byName=new Map();clients.forEach(c=>{const n=normName(c.name);if(n){if(!byName.has(n))byName.set(n,[]);byName.get(n).push(c)}});
  byName.forEach((arr,n)=>{if(arr.length>1)console.warn("MAP Vault: "+arr.length+" clients share normalised name "+JSON.stringify(n)+" — related rows attached to all; disambiguate in the sheet")});
  const fanout=name=>byName.get(normName(name))||[];
  (d.Logins||[]).forEach(r=>{const cs=fanout(r.entity);if(cs.length)cs.forEach(c=>c.logins.push(r));else client("",r.entity).logins.push(r)});
  (d.PersonalCodes||[]).forEach(r=>{
    fanout(r.company).forEach(c=>c.codes.push(r));
    const pk=r.person.trim().toLowerCase();
    if(!people.has(pk))people.set(pk,{person:r.person,entries:[]});
    people.get(pk).entries.push(r);
  });
  (d.Pensions||[]).forEach(r=>{fanout(r.employer).forEach(c=>c.pension.push(r))});
  const list=[...clients.values()].filter(c=>c.name);
  list.sort((a,b)=>a.name.localeCompare(b.name));
  IDX={clients:list,byKey:new Map(list.map(c=>[c.k,c])),people:[...people.values()]};
}

/* VAT next-due computed live from the stagger (so it never goes stale between the
   weekly sync and the monthly 7th deadlines). Mirrors roster.py vat_next_due(). */
const VAT_MONTHS={jan:1,january:1,feb:2,february:2,mar:3,march:3,apr:4,april:4,may:5,jun:6,june:6,
  jul:7,july:7,aug:8,august:8,sep:9,sept:9,september:9,oct:10,october:10,nov:11,november:11,dec:12,december:12};
function vatNextDue(stagger){
  if(!stagger)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const low=String(stagger).toLowerCase(),Y=today.getFullYear();
  const dueFor=(y,m)=>{let dm=m+2,dy=y;while(dm>12){dm-=12;dy++;}return new Date(dy,dm-1,7);};
  const monthEnd=(y,m)=>new Date(y,m,0);
  let ends=[];
  if(low.includes("monthly")){for(const y of[Y-1,Y,Y+1])for(let m=1;m<=12;m++)ends.push([y,m]);}
  else{
    const mm=low.match(/[a-z]+/g),endm=mm?VAT_MONTHS[mm[mm.length-1]]:null;
    if(!endm)return null;
    const cyc=[...new Set([0,1,2,3].map(i=>((endm-1+3*i)%12)+1))];
    for(const y of[Y-1,Y,Y+1])for(const m of cyc)ends.push([y,m]);
  }
  let best=null;
  for(const[y,m]of ends){const d=dueFor(y,m);if(d>=today&&(!best||d<best.due))best={due:d,pe:monthEnd(y,m)};}
  if(!best)return null;
  const f=d=>String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();
  return {due:f(best.due),periodEnd:f(best.pe)};
}
function clientVat(c){
  const r=c.c||{};
  if(r.vatStagger){const v=vatNextDue(r.vatStagger);if(v)return {due:v.due,periodEnd:v.periodEnd,stagger:r.vatStagger};}
  if(r.vatDue)return {due:r.vatDue,periodEnd:r.vatPeriodEnd||"",stagger:r.vatStagger||""};
  return null;
}

function nextDue(c){
  const cand=[];
  if(c.dl&&c.dl.status==="active"){
    if(c.dl.accountsDue)cand.push({t:"Accounts",s:c.dl.accountsDue,o:c.dl.accountsOverdue==="yes",days:daysTo(c.dl.accountsDue)});
    if(c.dl.csDue)cand.push({t:"CS",s:c.dl.csDue,o:c.dl.csOverdue==="yes",days:daysTo(c.dl.csDue)});
  }
  const vat=clientVat(c);
  if(vat)cand.push({t:"VAT",s:vat.due,o:false,days:daysTo(vat.due)});
  if(!cand.length)return null;
  cand.sort((a,b)=>(a.days??9e9)-(b.days??9e9));
  return cand[0];
}

const DLF=[["soon","Next 60 days"],["overdue","Overdue"],["acc","Accounts"],["cs","Conf. statements"],["vat","VAT"],["all","All"]];
function pillbar(mode){ // mode: "dlf" filters in place, "dlnav" jumps to the calendar
  // only the in-place Deadlines pills reflect the active filter; Home pills are plain nav
  return DLF.map(([id,l])=>'<button class="fbtn'+(mode==="dlf"&&DLFILTER===id?" on":"")+'" data-'+mode+'="'+id+'">'+esc(l)+"</button>").join("");
}
function deadlineItems(){
  const items=[];
  IDX.clients.forEach(c=>{
    const dl=c.dl;
    if(dl&&dl.status==="active"){
      if(dl.accountsDue)items.push({c,t:"acc",label:"Accounts",due:dl.accountsDue,days:daysTo(dl.accountsDue),o:dl.accountsOverdue==="yes",sub:"made up to "+(dl.accountsMadeUpTo||"—")});
      if(dl.csDue)items.push({c,t:"cs",label:"Confirmation statement",due:dl.csDue,days:daysTo(dl.csDue),o:dl.csOverdue==="yes",sub:"statement date "+(dl.csMadeUpTo||"—")});
    }
    const vat=clientVat(c);
    if(vat)items.push({c,t:"vat",label:"VAT return",due:vat.due,days:daysTo(vat.due),o:false,
      sub:(vat.stagger?vat.stagger+" · ":"")+"period end "+(vat.periodEnd||"—")});
  });
  return items;
}
function isOverdue(i){return i.o||(i.days!=null&&i.days<0)}
function dlFiltered(items){
  if(DLFILTER==="overdue")return items.filter(isOverdue);
  const up=items.filter(i=>!isOverdue(i));   // overdue = disengaged/not filing -> ignored everywhere else
  if(DLFILTER==="acc")return up.filter(i=>i.t==="acc");
  if(DLFILTER==="cs")return up.filter(i=>i.t==="cs");
  if(DLFILTER==="vat")return up.filter(i=>i.t==="vat");
  if(DLFILTER==="soon")return up.filter(i=>i.days!=null&&i.days<=60);
  return up;   // all upcoming
}

    '<div class="rmain"><div class="rname">'+esc(i.c.name)+'</div><div class="rsub">'+esc(i.label)+' · '+esc(i.sub)+'</div></div>'+
    '<span class="pill '+cls+'">'+esc(i.due)+(nt?" · "+esc(nt):"")+"</span><span class=\"chev\">›</span></div>";

function calendarHTML(items){

  const y=CAL.y,m=CAL.m,first=new Date(y,m,1);

  const now=new Date(), curMonth=now.getFullYear()===y&&now.getMonth()===m;
  const monthName=first.toLocaleDateString("en-GB",{month:"long",year:"numeric"});
  let cells="";

  for(let d=1;d<=dim;d++){

    '<button class="iconbtn" data-cal="1">›</button></span></div>'+
    '<div class="calgrid caldow">'+["M","T","W","T","F","S","S"].map(x=>"<div>"+x+"</div>").join("")+"</div>"+
    '<div class="calgrid">'+cells+"</div>"+
    '<div class="callegend"><span><span class="dot acc"></span>Accounts</span><span><span class="dot cs"></span>Conf. stmt</span>'+
    '<span><span class="dot vat"></span>VAT</span></div></div>';

  Object.keys(misc).forEach((tab,i)=>{
    h+='<div class="acc" data-acc="'+i+'"><button>📄 '+esc(tab)+'<span class="chev">›</span></button><div class="accbody"><table class="misc">'+
      misc[tab].map(r=>"<tr>"+r.map(c=>"<td>"+esc(c)+"</td>").join("")+"</tr>").join("")+"</table></div></div>";
  });
  h+="</div>";
  if(STATE.miscSecret&&STATE.miscSecret.length){
    h+='<div class="section"><h2>Credential sheets (admin)</h2></div><div class="card" style="padding-top:12px">';
    STATE.miscSecret.forEach(msec=>{
      h+='<div class="locked"><span>🔒 <b>'+esc(msec.tab)+'</b> · '+msec.rows+' rows</span><button class="btn" style="padding:7px 13px" data-misc="'+esc(msec.tab)+'">Open</button></div>';
    });
    h+="</div>";
  }
  h+='<div class="section"><h2>This device</h2></div><div class="card" style="padding:14px 16px;font-size:14px">'+
    'Signed in as <b>'+esc(STATE.me)+'</b> <span class="badge '+(STATE.role==="admin"?"admin":"")+'">'+esc(STATE.role)+'</span>'+
    '<div style="color:var(--mut);font-size:13px;margin-top:6px">Client data synced '+esc(STATE.lastSync||"—")+
    (chRefreshed()?" · CH deadlines refreshed "+esc(chRefreshed()):"")+
    '</div><div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">'+
    '<button class="btn" id="reloadBtn">↻ Reload</button><button class="btn" id="reconnBtn">Change code</button></div>'+
    '<div style="color:var(--mut);font-size:12px;margin-top:12px">Every reveal of a code or password is logged with your name. Codes and passwords are never stored on this device.</div></div>';
  v.innerHTML=h;wire(v);
}

/* ---------- wiring ---------- */
function openClient(k){
  DETAIL={k};
  const rec=loadJ(RECENT_KEY,[]).filter(x=>x!==k);rec.unshift(k);saveJ(RECENT_KEY,rec.slice(0,6));
  window.scrollTo(0,0);paint();
}
function wire(v){
  v.querySelectorAll("[data-open]").forEach(el=>el.onclick=()=>openClient(el.dataset.open));
  v.querySelectorAll("[data-person]").forEach(el=>el.onclick=()=>{DETAIL={person:el.dataset.person};window.scrollTo(0,0);paint()});
  v.querySelectorAll("[data-nav]").forEach(el=>el.onclick=()=>{VIEWN=el.dataset.nav;DETAIL=null;if(el.dataset.f)DLFILTER=el.dataset.f;paint()});
  v.querySelectorAll("[data-dlf]").forEach(el=>el.onclick=()=>{DLFILTER=el.dataset.dlf;CAL.sel=null;paint()});
  v.querySelectorAll("[data-dlnav]").forEach(el=>el.onclick=()=>{DLFILTER=el.dataset.dlnav;CAL.sel=null;VIEWN="deadlines";DETAIL=null;window.scrollTo(0,0);paint()});
  v.querySelectorAll("[data-cal]").forEach(el=>el.onclick=()=>{
    const d=+el.dataset.cal;CAL.sel=null;
    if(d===0){const n=new Date();CAL.y=n.getFullYear();CAL.m=n.getMonth()}
    else{CAL.m+=d;if(CAL.m<0){CAL.m=11;CAL.y--}if(CAL.m>11){CAL.m=0;CAL.y++}}
    paint();
  });
  v.querySelectorAll("[data-day]").forEach(el=>el.onclick=()=>{CAL.sel=CAL.sel===el.dataset.day?null:el.dataset.day;paint()});
  v.querySelectorAll("[data-calclear]").forEach(el=>el.onclick=()=>{CAL.sel=null;paint()});
  v.querySelectorAll("[data-copy]").forEach(b=>b.onclick=e=>{e.stopPropagation();copyTxt(b.dataset.copy)});
  const back=v.querySelector("#back");if(back)back.onclick=()=>{DETAIL=null;paint()};
  v.querySelectorAll("[data-acc]").forEach(a=>{a.querySelector("button").onclick=()=>a.classList.toggle("open")});
  v.querySelectorAll("[data-rev]").forEach(b=>b.onclick=async e=>{
    e.stopPropagation();
    b.textContent="…";b.disabled=true;
    try{
      const q=JSON.parse(b.dataset.rev);
      const j=await api("reveal",q);
      const cell=b.closest(".fact").querySelector(".fv");
      cell.innerHTML='<span class="revealed">'+esc(j.value)+"</span>";
      const cp=document.createElement("button");cp.className="copy";cp.textContent="⧉";cp.onclick=()=>copyTxt(j.value);
      b.replaceWith(cp);
      setTimeout(()=>{if(!cell.isConnected)return;cell.textContent="•••••";b.textContent="Reveal";b.disabled=false;cp.replaceWith(b);toast("Hidden again")},45000);
    }catch(err){b.textContent="Reveal";b.disabled=false;toast(err.message||"Failed")}
  });
  v.querySelectorAll("[data-misc]").forEach(b=>b.onclick=async()=>{
    b.textContent="…";b.disabled=true;
    try{
      const j=await api("revealMisc",{tab:b.dataset.misc});
      const div=document.createElement("div");div.className="accbody";div.style.display="block";div.style.padding="0 16px 14px";
      div.innerHTML='<table class="misc">'+j.rows.map(r=>"<tr>"+r.map(c=>"<td>"+esc(c)+"</td>").join("")+"</tr>").join("")+"</table>";
      b.closest(".locked").after(div);b.remove();
    }catch(err){b.textContent="Open";b.disabled=false;toast(err.message||"Failed")}
  });
  const rl=v.querySelector("#reloadBtn");if(rl)rl.onclick=()=>connect(true);
  const rc=v.querySelector("#reconnBtn");if(rc)rc.onclick=()=>showConnect();
}
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{VIEWN=b.dataset.v;DETAIL=null;CAL.sel=null;Q="";$("#q").value="";$("#qclear").style.display="none";window.scrollTo(0,0);paint()});

/* ---------- search ---------- */
let qt;
$("#q").addEventListener("input",e=>{
  clearTimeout(qt);
  qt=setTimeout(()=>{Q=e.target.value.trim();$("#qclear").style.display=Q?"block":"none";if(DETAIL)DETAIL=null;paint()},110);
});
$("#qclear").onclick=()=>{Q="";$("#q").value="";$("#qclear").style.display="none";paint()};

/* ---------- connect modal ---------- */
function showConnect(msg){
  $("#mMsg").textContent=msg||"Paste your personal access code (from your invite link). It stays on this device only.";
  $("#mUrl").value=CFG.url||DEFAULT_API_URL;
  $("#mCode").value=CFG.code||"";
  $("#scrim").classList.add("on");
}
function closeConnect(){$("#scrim").classList.remove("on")}
$("#mCancel").onclick=closeConnect;
$("#mConnect").onclick=()=>{
  CFG.code=$("#mCode").value.trim();
  CFG.url=($("#mUrl").value.trim())||DEFAULT_API_URL;
  if(!CFG.code){toast("Access code needed");return}
  saveJ(CFG_KEY,CFG);connect(true);
};

/* ---------- theme + boot ---------- */
$("#themeBtn").onclick=()=>{
  const cur=document.documentElement.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  const nx=cur==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",nx);localStorage.setItem(THEME_KEY,nx);
};
(function boot(){
  const s=localStorage.getItem(THEME_KEY);if(s)document.documentElement.setAttribute("data-theme",s);
  const p=new URLSearchParams(location.search);
  if(p.get("k")){CFG.code=p.get("k");CFG.url=p.get("u")||DEFAULT_API_URL;saveJ(CFG_KEY,CFG);history.replaceState({},"",location.pathname)}
  if(CFG.code)connect(false);else showConnect();
})();
</script>
